name: C6A OKX Source Authority Research

on:
  push:
    branches:
      - research/c6a-okx-source-authority
    paths:
      - .github/workflows/c6a-okx-source-authority-research.yml

permissions:
  contents: write

jobs:
  compact-findings:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build compact article authority index
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          source = Path("research/c6a-okx-source-authority/summary.json")
          payload = json.loads(source.read_text(encoding="utf-8"))
          if payload.get("schema_version") != 6:
              raise SystemExit("article-body summary V6 is required")
          articles = payload.get("relevant_articles")
          if not isinstance(articles, list) or len(articles) != 18:
              raise SystemExit("expected exactly 18 article-body matches")
          compact = {
              "schema_version": 1,
              "stage": "C6A_METADATA_AUTHORITY_INDEX",
              "status": "PASS",
              "catalog_page_count": payload["catalog_page_count"],
              "catalog_records_sha256": payload["catalog_records_sha256"],
              "metadata_change_candidate_count": payload[
                  "metadata_change_candidate_count"
              ],
              "article_body_only": True,
              "relevant_article_count": len(articles),
              "articles": [
                  {
                      "title": row["title"],
                      "url": row["url"],
                      "symbols": row["symbols"],
                      "fields": row["fields"],
                      "response_sha256": row["response"]["sha256"],
                      "article_body_sha256": row["article_body_sha256"],
                  }
                  for row in articles
              ],
              "article_errors": payload["article_errors"],
              "authenticated": False,
              "market_file_downloaded": False,
              "economic_result_run": False,
              "c6b_state": "C6B_CLOSED",
              "c5b_state": "C5B_CLOSED_AND_UNTOUCHED",
              "holdout_state": "HOLDOUT_CLOSED",
              "paper_state": "PAPER_CLOSED",
              "shadow_state": "SHADOW_CLOSED",
              "live": "FORBIDDEN",
          }
          output = Path("research/c6a-okx-source-authority/compact.json")
          output.write_text(
              json.dumps(compact, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(f"compacted {len(articles)} article-body matches")
          PY

      - name: Publish compact authority index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/c6a-okx-source-authority/compact.json
          git commit -m "research(c6a): retain compact metadata authority index"
          git push origin HEAD:research/c6a-okx-source-authority
