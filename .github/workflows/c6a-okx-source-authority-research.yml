name: C6A OKX Source Authority Research

on:
  push:
    branches:
      - research/c6a-okx-source-authority
    paths:
      - .github/workflows/c6a-okx-source-authority-research.yml

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

jobs:
  inspect-official-directory:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve official funding archive query shape
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          forbidden = [
              name
              for name in os.environ
              if name.upper().startswith("OKX_")
              or name.upper().startswith("OK_ACCESS_")
          ]
          if forbidden:
              raise SystemExit(f"credential-like environment variables present: {forbidden}")

          out = Path("c6a-okx-source-authority-research")
          out.mkdir(exist_ok=True)
          endpoint = "https://www.okx.com/api/v5/public/market-data-history"
          begin = "1704067200000"  # 2024-01-01T00:00:00Z
          end = "1706745599000"    # 2024-01-31T23:59:59Z
          requests = []
          for asset in ("BTC", "ETH"):
              requests.extend(
                  [
                      {
                          "variant": "family-monthly",
                          "module": "3",
                          "instType": "SWAP",
                          "instFamilyList": f"{asset}-USDT",
                          "dateAggrType": "monthly",
                          "begin": begin,
                          "end": end,
                      },
                      {
                          "variant": "instrument-monthly",
                          "module": "3",
                          "instType": "SWAP",
                          "instIdList": f"{asset}-USDT-SWAP",
                          "dateAggrType": "monthly",
                          "begin": begin,
                          "end": end,
                      },
                      {
                          "variant": "instrument-monthly-no-type",
                          "module": "3",
                          "instIdList": f"{asset}-USDT-SWAP",
                          "dateAggrType": "monthly",
                          "begin": begin,
                          "end": end,
                      },
                      {
                          "variant": "family-daily-control",
                          "module": "3",
                          "instType": "SWAP",
                          "instFamilyList": f"{asset}-USDT",
                          "dateAggrType": "daily",
                          "begin": begin,
                          "end": "1705276800000",
                      },
                  ]
              )

          rows = []
          for index, source in enumerate(requests, start=1):
              params = {key: value for key, value in source.items() if key != "variant"}
              url = f"{endpoint}?{urllib.parse.urlencode(params)}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "ai-autonomous-trading-os-c6a-source-authority/1.0",
                      "Accept": "application/json",
                  },
              )
              record = {
                  "index": index,
                  "variant": source["variant"],
                  "request_url": url,
                  "params": params,
                  "authenticated": False,
              }
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      body = response.read()
                      record.update(
                          {
                              "http_status": response.status,
                              "final_url": response.geturl(),
                              "content_type": response.headers.get("Content-Type"),
                              "response_size": len(body),
                              "response_sha256": hashlib.sha256(body).hexdigest(),
                              "response_text": body.decode("utf-8", "replace"),
                          }
                      )
              except urllib.error.HTTPError as exc:
                  body = exc.read()
                  record.update(
                      {
                          "http_status": exc.code,
                          "final_url": exc.geturl(),
                          "content_type": exc.headers.get("Content-Type"),
                          "response_size": len(body),
                          "response_sha256": hashlib.sha256(body).hexdigest(),
                          "response_text": body.decode("utf-8", "replace"),
                      }
                  )
              except Exception as exc:
                  record["transport_error"] = repr(exc)
              rows.append(record)
              time.sleep(0.4)

          parsed = []
          for row in rows:
              text = row.get("response_text")
              payload = None
              if isinstance(text, str):
                  try:
                      payload = json.loads(text)
                  except json.JSONDecodeError:
                      payload = None
              parsed.append(
                  {
                      "variant": row["variant"],
                      "params": row["params"],
                      "http_status": row.get("http_status"),
                      "code": payload.get("code") if isinstance(payload, dict) else None,
                      "msg": payload.get("msg") if isinstance(payload, dict) else None,
                      "data": payload.get("data") if isinstance(payload, dict) else None,
                      "response_sha256": row.get("response_sha256"),
                      "transport_error": row.get("transport_error"),
                  }
              )

          summary = {
              "schema_version": 3,
              "stage": "C6A_SOURCE_AUTHORITY_RESEARCH",
              "status": "PASS",
              "endpoint": endpoint,
              "request_count": len(rows),
              "requests": parsed,
              "authenticated": False,
              "market_file_downloaded": False,
              "economic_result_run": False,
              "c6b_state": "C6B_CLOSED",
              "c5b_state": "C5B_CLOSED_AND_UNTOUED",
              "holdout_state": "HOLDOUT_CLOSED",
              "paper_state": "PAPER_CLOSED",
              "shadow_state": "SHADOW_CLOSED",
              "live": "FORBIDDEN",
          }
          (out / "summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(f"queried {len(rows)} funding-directory variants")
          PY

      - name: Upload exact response evidence
        uses: actions/upload-artifact@v4
        with:
          name: c6a-okx-source-authority-${{ github.run_id }}
          path: c6a-okx-source-authority-research
          retention-days: 7
          if-no-files-found: error

      - name: Publish compact summary to temporary research branch
        run: |
          mkdir -p research/c6a-okx-source-authority
          cp c6a-okx-source-authority-research/summary.json \
            research/c6a-okx-source-authority/summary.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/c6a-okx-source-authority/summary.json
          git commit -m "research(c6a): retain funding-directory resolution"
          git push origin HEAD:research/c6a-okx-source-authority
