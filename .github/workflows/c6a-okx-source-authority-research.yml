name: C6A OKX Source Authority Research

on:
  push:
    branches:
      - research/c6a-okx-source-authority
    paths:
      - .github/workflows/c6a-okx-source-authority-research.yml

permissions:
  contents: write

jobs:
  archived-official-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decode exact archived OKX public instrument responses
        run: |
          python - <<'PY'
          from __future__ import annotations

          import gzip
          import hashlib
          import json
          import os
          import time
          import urllib.parse
          import urllib.request
          from pathlib import Path

          forbidden = [
              name for name in os.environ
              if name.upper().startswith("OKX_")
              or name.upper().startswith("OK_ACCESS_")
          ]
          if forbidden:
              raise SystemExit(f"credential-like environment variables present: {forbidden}")

          out = Path("c6a-okx-source-authority-research")
          out.mkdir(exist_ok=True)
          retained = out / "archived-official-responses"
          retained.mkdir(exist_ok=True)

          CDX = "https://web.archive.org/cdx/search/cdx"
          TARGETS = {
              "BTC-USDT",
              "ETH-USDT",
              "BTC-USDT-SWAP",
              "ETH-USDT-SWAP",
          }

          def fetch(url: str) -> tuple[bytes, dict]:
              request = urllib.request.Request(
                  url,
                  headers={
                      "User-Agent": "ai-autonomous-trading-os-c6a-source-authority/1.0",
                      "Accept": "application/json,*/*",
                  },
              )
              with urllib.request.urlopen(request, timeout=90) as response:
                  body = response.read()
                  return body, {
                      "requested_url": url,
                      "final_url": response.geturl(),
                      "http_status": response.status,
                      "content_type": response.headers.get("Content-Type"),
                      "content_encoding": response.headers.get("Content-Encoding"),
                      "size": len(body),
                      "sha256": hashlib.sha256(body).hexdigest(),
                  }

          query = []
          params = {
              "url": "www.okx.com/api/v5/public/instruments",
              "matchType": "prefix",
              "from": "2023",
              "to": "2025",
              "output": "json",
              "fl": "timestamp,original,digest,statuscode,mimetype,length",
              "limit": "5000",
          }
          for key, value in params.items():
              query.append((key, value))
          query.extend(
              [
                  ("filter", "statuscode:200"),
                  ("filter", "mimetype:application/json"),
              ]
          )
          cdx_url = CDX + "?" + urllib.parse.urlencode(query)
          cdx_body, cdx_meta = fetch(cdx_url)
          cdx_payload = json.loads(cdx_body.decode("utf-8"))
          if not isinstance(cdx_payload, list) or len(cdx_payload) < 2:
              raise SystemExit("Wayback CDX returned no archived official responses")
          header = cdx_payload[0]
          records = [
              dict(zip(header, row))
              for row in cdx_payload[1:]
              if isinstance(row, list) and len(row) == len(header)
          ]

          snapshots = []
          errors = []
          for index, record in enumerate(records, start=1):
              timestamp = str(record["timestamp"])
              original = str(record["original"])
              replay_url = (
                  f"https://web.archive.org/web/{timestamp}id_/{original}"
              )
              try:
                  raw_body, response_meta = fetch(replay_url)
                  decoded = (
                      gzip.decompress(raw_body)
                      if raw_body.startswith(b"\x1f\x8b")
                      else raw_body
                  )
                  payload = json.loads(decoded.decode("utf-8"))
                  rows = payload.get("data") if isinstance(payload, dict) else None
                  if not isinstance(rows, list):
                      raise ValueError("archived response lacks data list")
                  matches = {
                      str(row.get("instId")): {
                          key: row.get(key)
                          for key in (
                              "instId",
                              "instType",
                              "baseCcy",
                              "quoteCcy",
                              "settleCcy",
                              "ctType",
                              "ctVal",
                              "ctValCcy",
                              "lotSz",
                              "minSz",
                              "tickSz",
                              "listTime",
                              "state",
                          )
                      }
                      for row in rows
                      if isinstance(row, dict)
                      and str(row.get("instId")) in TARGETS
                  }
                  raw_path = retained / f"{index:03d}-{timestamp}.raw"
                  json_path = retained / f"{index:03d}-{timestamp}.json"
                  raw_path.write_bytes(raw_body)
                  json_path.write_bytes(decoded)
                  snapshots.append(
                      {
                          "timestamp": timestamp,
                          "original": original,
                          "replay_url": replay_url,
                          "cdx_digest": record.get("digest"),
                          "cdx_length": record.get("length"),
                          "raw_response": response_meta,
                          "raw_path": str(raw_path),
                          "decoded_path": str(json_path),
                          "decoded_size": len(decoded),
                          "decoded_sha256": hashlib.sha256(decoded).hexdigest(),
                          "gzip_decoded": raw_body.startswith(b"\x1f\x8b"),
                          "target_instruments": matches,
                      }
                  )
              except Exception as exc:
                  errors.append(
                      {
                          "timestamp": timestamp,
                          "original": original,
                          "replay_url": replay_url,
                          "error": repr(exc),
                      }
                  )
              time.sleep(0.35)

          summary = {
              "schema_version": 2,
              "stage": "C6A_ARCHIVED_OFFICIAL_METADATA_RESEARCH",
              "status": "PASS",
              "cdx_query": cdx_meta,
              "cdx_record_count": len(records),
              "successful_snapshot_count": len(snapshots),
              "snapshot_error_count": len(errors),
              "snapshots": snapshots,
              "snapshot_errors": errors,
              "interpretation_boundary": (
                  "Only exact archived bytes returned from an official OKX API URL "
                  "are eligible. Every raw and decoded response is SHA-256 bound."
              ),
              "authenticated": False,
              "market_file_downloaded": False,
              "economic_result_run": False,
              "c6b_state": "C6B_CLOSED",
              "c5b_state": "C5B_CLOSED_AND_UNTOUCHED",
              "holdout_state": "HOLDOUT_CLOSED",
              "paper_state": "PAPER_CLOSED",
              "shadow_state": "SHADOW_CLOSED",
              "live": "FORBIDDEN",
          }
          summary_path = out / "wayback-summary-v2.json"
          summary_path.write_text(
              json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(
              f"CDX={len(records)} decoded={len(snapshots)} errors={len(errors)}"
          )
          PY

      - name: Upload exact archived-response evidence
        uses: actions/upload-artifact@v4
        with:
          name: c6a-okx-archived-official-metadata-${{ github.run_id }}
          path: c6a-okx-source-authority-research
          retention-days: 7
          if-no-files-found: error

      - name: Publish archived-response summary
        run: |
          cp c6a-okx-source-authority-research/wayback-summary-v2.json \
            research/c6a-okx-source-authority/wayback-summary-v2.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/c6a-okx-source-authority/wayback-summary-v2.json
          git commit -m "research(c6a): retain decoded archived official metadata"
          git push origin HEAD:research/c6a-okx-source-authority
