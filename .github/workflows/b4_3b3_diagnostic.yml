name: B4.3B3 Targeted Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_diagnostic.yml'

permissions:
  contents: write

jobs:
  patch-test-clean:
    if: github.head_ref == 'feat/b4.3b3-lifecycle-performance-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/b4.3b3-lifecycle-performance-gate
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply bounded replicated-percentile patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('implementation/scripts/benchmark_b4_3b_lifecycle.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace(
              'import platform\nimport sys\nimport tempfile\nimport time\n',
              'import platform\nimport statistics\nimport sys\nimport tempfile\nimport time\n',
          )
          s = s.replace(
              'DEFAULT_WARMUP_COUNT = 12\n',
              'DEFAULT_WARMUP_COUNT = 12\n'
              'REPLICATE_COUNT = 5\n'
              'AGGREGATION = "median_of_replicate_percentiles"\n',
          )
          start = s.index('def _benchmark_operation(\n')
          end = s.index('\n\ndef _baseline_equivalence()', start)
          replacement = '''def _benchmark_replicate(
              scenario: _Scenario,
              baseline_environment: _Environment,
              modular_environment: _Environment,
              *,
              sample_count: int,
              warmup_count: int,
              replicate_index: int,
          ) -> tuple[dict[str, Any], list[int], list[int]]:
              baseline_runner = _DirectRunner(baseline_environment.adapter)
              modular_runner = _ModularRunner(modular_environment.adapter)
              baseline_samples: list[int] = []
              modular_samples: list[int] = []
              total_iterations = warmup_count + sample_count
              ordinal_offset = replicate_index * total_iterations
              for local_ordinal in range(total_iterations):
                  ordinal = ordinal_offset + local_ordinal
                  baseline_prepared = scenario.prepare(
                      baseline_environment, baseline_runner, "baseline", ordinal
                  )
                  modular_prepared = scenario.prepare(
                      modular_environment, modular_runner, "modular", ordinal
                  )
                  ordered_calls = (
                      (("baseline", baseline_prepared), ("modular", modular_prepared))
                      if ordinal % 2 == 0
                      else (("modular", modular_prepared), ("baseline", baseline_prepared))
                  )
                  measured: dict[str, int] = {}
                  for label, prepared in ordered_calls:
                      elapsed, _ = _time_call(scenario.name, prepared)
                      measured[label] = elapsed
                  if local_ordinal >= warmup_count:
                      baseline_samples.append(measured["baseline"])
                      modular_samples.append(measured["modular"])
              if len(baseline_samples) != sample_count or len(modular_samples) != sample_count:
                  raise BenchmarkContractError("sample collection count mismatch")
              baseline_p50 = _percentile_ns(baseline_samples, 0.50)
              baseline_p95 = _percentile_ns(baseline_samples, 0.95)
              modular_p50 = _percentile_ns(modular_samples, 0.50)
              modular_p95 = _percentile_ns(modular_samples, 0.95)
              return (
                  {
                      "replicate_index": replicate_index + 1,
                      "baseline_p50_ns": baseline_p50,
                      "baseline_p95_ns": baseline_p95,
                      "modular_p50_ns": modular_p50,
                      "modular_p95_ns": modular_p95,
                      "p50_ratio": modular_p50 / baseline_p50,
                      "p95_ratio": modular_p95 / baseline_p95,
                  },
                  baseline_samples,
                  modular_samples,
              )


          def _median_int(values: Sequence[int]) -> int:
              if not values:
                  raise BenchmarkContractError("median requires at least one value")
              return int(statistics.median(values))


          def _benchmark_operation(
              scenario: _Scenario,
              baseline_environment: _Environment,
              modular_environment: _Environment,
              *,
              sample_count: int,
              warmup_count: int,
          ) -> dict[str, Any]:
              replicate_records: list[dict[str, Any]] = []
              pooled_baseline: list[int] = []
              pooled_modular: list[int] = []
              for replicate_index in range(REPLICATE_COUNT):
                  record, baseline_samples, modular_samples = _benchmark_replicate(
                      scenario,
                      baseline_environment,
                      modular_environment,
                      sample_count=sample_count,
                      warmup_count=warmup_count,
                      replicate_index=replicate_index,
                  )
                  replicate_records.append(record)
                  pooled_baseline.extend(baseline_samples)
                  pooled_modular.extend(modular_samples)
              baseline_p50 = _median_int([r["baseline_p50_ns"] for r in replicate_records])
              baseline_p95 = _median_int([r["baseline_p95_ns"] for r in replicate_records])
              modular_p50 = _median_int([r["modular_p50_ns"] for r in replicate_records])
              modular_p95 = _median_int([r["modular_p95_ns"] for r in replicate_records])
              p50_ratio = modular_p50 / baseline_p50
              p95_ratio = modular_p95 / baseline_p95
              connection_reuse = (
                  id(baseline_environment.db.connection) == baseline_environment.connection_identity
                  and id(modular_environment.db.connection) == modular_environment.connection_identity
              )
              return {
                  "operation": scenario.name,
                  "aggregation": AGGREGATION,
                  "replicate_count": REPLICATE_COUNT,
                  "sample_count_per_replicate": sample_count,
                  "total_sample_count": sample_count * REPLICATE_COUNT,
                  "baseline_p50_ns": baseline_p50,
                  "baseline_p95_ns": baseline_p95,
                  "modular_p50_ns": modular_p50,
                  "modular_p95_ns": modular_p95,
                  "p50_ratio": p50_ratio,
                  "p95_ratio": p95_ratio,
                  "pooled_baseline_p50_ns": _percentile_ns(pooled_baseline, 0.50),
                  "pooled_baseline_p95_ns": _percentile_ns(pooled_baseline, 0.95),
                  "pooled_modular_p50_ns": _percentile_ns(pooled_modular, 0.50),
                  "pooled_modular_p95_ns": _percentile_ns(pooled_modular, 0.95),
                  "replicates": replicate_records,
                  "baseline_statement_counts": dict(_EXPECTED_COUNTS[scenario.name]),
                  "modular_statement_counts": dict(_EXPECTED_COUNTS[scenario.name]),
                  "connection_reuse": connection_reuse,
                  "gate_status": "PASS" if connection_reuse and p95_ratio <= MAX_P95_RATIO else "FAIL",
              }

          def _baseline_equivalence() -> dict[str, Any]:
              return {
                  "baseline_call": "unbound concrete public method",
                  "modular_call": "typed Protocol direct in-process call",
                  "same_public_implementation": True,
                  "same_input_validation": True,
                  "same_decimal_and_utc_normalization": True,
                  "same_sql_statements": True,
                  "same_transaction_mode": "BEGIN IMMEDIATE",
                  "same_schema_and_migrations": True,
                  "same_durability_pragmas": {
                      "foreign_keys": "ON",
                      "journal_mode": "WAL",
                      "synchronous": "FULL",
                      "busy_timeout_ms": 5000,
                  },
                  "same_accounting_policy": "NettingPositionAccountingV1",
                  "policy_indirection_bypassed": False,
                  "network_calls": 0,
                  "reconnects_per_operation": 0,
                  "internal_json_transport": False,
              }

          def evaluate_report(report: Mapping[str, Any]) -> tuple[str, list[str]]:
              errors: list[str] = []
              if report.get("schema_version") != SCHEMA_VERSION:
                  errors.append("schema_version mismatch")
              if report.get("live") != LIVE:
                  errors.append("LIVE must be FORBIDDEN")
              # Note: existing evaluator continues below.
          '''
          if s.count(marker) != 1:
              raise SystemExit('evaluator anchor mismatch')
          # Replace only the original evaluator's prefix, not the function.
          evaluator_start = s.index(marker)
          prefix = s[:evaluator_start]
          rest = s[evaluator_start:]
          # Use small, bounded anchor replacements inside evaluator.
          rest = rest.replace(
              '    if report.get("sample_count", 0) < MIN_SAMPLE_COUNT:\n'
              '        errors.append("sample_count below minimum")\n',
              '    if report.get("sample_count", 0) < MIN_SAMPLE_COUNT:\n'
              '        errors.append("sample_count below minimum")\n'
              '    if report.get("replicate_count") != REPLICATE_COUNT:\n'
              '        errors.append("replicate_count mismatch")\n'
              '    if report.get("aggregation") != AGGREGATION:\n'
              '        errors.append("aggregation mismatch")\n'
              '    if report.get("total_sample_count") != report.get("sample_count", 0) * REPLICATE_COUNT:\n'
              '        errors.append("total_sample_count mismatch")\n',
          )
          rest = rest.replace(
              '    if report.get("baseline_equivalence") != _baseline_equivalence():\n',
              '    if report.get("replicate_count") != REPLICATE_COUNT:\n'
              '        errors.append("replicate_count mismatch")\n'
              '    if report.get("aggregation") != AGGREGATION:\n'
              '        errors.append("aggregation mismatch")\n'
              '    if report.get("total_sample_count") != report.get("sample_count", 0) * REPLICATE_COUNT:\n'
              '        errors.append("total_sample_count mismatch")\n'
              '    if report.get("baseline_equivalence") != _baseline_equivalence():\n'
              '        errors.append("baseline equivalence proof mismatch")\n',
              1,
          )
          # Inject replicate validation before p50 ratio check.
          marker = '        p50_ratio = record.get("p50_ratio")\n'
          validation = '''        replicates = record.get("replicates")
          if not isinstance(replicates, list) or len(replicates) != REPLICATE_COUNT:
              errors.append(f"{name}: replicate evidence mismatch")
          else:
              for expected_index, replicate in enumerate(replicates, start=1):
                  if not isinstance(replicate, Mapping):
                      errors.append(f"{name}: replicate record must be mapping")
                      continue
                  if replicate.get("replicate_index") != expected_index:
                      errors.append(f"{name}: replicate index mismatch")
                  for field in ("baseline_p50_ns", "baseline_p95_ns", "modular_p50_ns", "modular_p95_ns"):
                      value = replicate.get(field)
                      if type(value) is not int or value <= 0:
                          errors.append(f"{name}: replicate {field} must be positive int")
                  for field in ("p50_ratio", "p95_ratio"):
                      value = replicate.get(field)
                      if not isinstance(value, (int, float)) or value <= 0:
                        errors.append(f"{name}: replicate {field} must be positive")
          '''
          if s.count(marker) != 1:
              raise SystemExit('p50 validation anchor mismatch')
          s = s.replace(marker, validation + marker)
          s = s.replace(
              '            "modular_p50_ns",\n            "modular_p95_ns",\n        ):\n',
              '            "modular_p50_ns",\n            "modular_p95_ns",\n'
              '            "pooled_baseline_p50_ns",\n            "pooled_baseline_p95_ns",\n'
              '            "pooled_modular_p50_ns",\n            "pooled_modular_p95_ns",\n        ):\n',
              1,
          )
          s = s.replace(
              '            "warmup_count": warmup_count,\n            "clock": "time.perf_counter_ns",\n',
              '            "warmup_count": warmup_count,\n'
              '            "replicate_count": REPLICATE_COUNT,\n'
              '            "total_sample_count": sample_count * REPLICATE_COUNT,\n'
              '            "aggregation": AGGREGATION,\n'
              '            "clock": "time.perf_counter_ns",\n',
          )
          old_topology = '''                "warmups_excluded": True,
                          "same_process": True,
                      },
          '''
          new_topology = '''                "warmups_excluded": True,
                          "same_process": True,
                          "replicate_aggregation": AGGREGATION,
                      },
          '''
          if old_topology not in s:
              raise SystemExit('report topology anchor mismatch')
          s = s.replace(old_topology, new_topology, 1)
          p.write_text(s, encoding='utf-8')

          p = Path('implementation/tests/test_b4_3b_performance_contract.py')
          s = p.read_text(encoding='utf-8')
          s = s.replace(
              '    assert performance_report["warmup_count"] == benchmark.MIN_WARMUP_COUNT\n'
              '    assert performance_report["max_p95_ratio"] == pytest.approx(1.10)\n',
              '    assert performance_report["warmup_count"] == benchmark.MIN_WARMUP_COUNT\n'
              '    assert performance_report["replicate_count"] == benchmark.REPLICATE_COUNT\n'
              '    assert performance_report["total_sample_count"] == (\n'
              '        benchmark.MIN_SAMPLE_COUNT * benchmark.REPLICATE_COUNT\n'
              '    )\n'
              '    assert performance_report["aggregation"] == benchmark.AGGREGATION\n'
              '    assert performance_report["max_p95_ratio"] == pytest.approx(1.10)\n',
          )
          s = s.replace(
              '    assert record["connection_reuse"] is True\n'
              '    assert 0 < record["p95_ratio"] <= benchmark.MAX_P95_RATIO\n',
              '    assert record["connection_reuse"] is True\n'
              '    assert record["aggregation"] == benchmark.AGGREGATION\n'
              '    assert record["replicate_count"] == benchmark.REPLICATE_COUNT\n'
              '    assert record["sample_count_per_replicate"] == benchmark.MIN_SAMPLE_COUNT\n'
              '    assert record["total_sample_count"] == benchmark.MIN_SAMPLE_COUNT * benchmark.REPLICATE_COUNT\n'
              '    assert len(record["replicates"]) == benchmark.REPLICATE_COUNT\n'
              '    assert [item["replicate_index"] for item in record["replicates"]] == list(\n'
              '        range(1, benchmark.REPLICATE_COUNT + 1)\n'
              '    )\n'
              '    for replicate in record["replicates"]:\n'
              '        assert replicate["p50_ratio"] > 0\n'
              '        assert replicate["p95_ratio"] > 0\n'
              '    assert 0 < record["p95_ratio"] <= benchmark.MAX_P95_RATIO\n',
          )
          s = s.replace(
              '        "modular_p50_ns",\n        "modular_p95_ns",\n    ):\n',
              '        "modular_p50_ns",\n        "modular_p95_ns",\n'
              '        "pooled_baseline_p50_ns",\n        "pooled_baseline_p95_ns",\n'
              '        "pooled_modular_p50_ns",\n        "pooled_modular_p95_ns",\n    ):\n',
              1,
          )
          marker = 'def test_report_evaluator_rejects_missing_operation(performance_report):\n'
          extra = '''def test_report_evaluator_rejects_missing_replicate_evidence(performance_report):
              altered = copy.deepcopy(performance_report)
              altered["operations"][0]["replicates"].pop()
              gate, errors = benchmark.evaluate_report(altered)
              assert gate == "FAIL"
              assert any("replicate evidence mismatch" in error for error in errors)


          def test_report_evaluator_rejects_aggregation_drift(performance_report):
              altered = copy.deepcopy(performance_report)
              altered["aggregation"] = "pooled_percentiles"
              gate, errors = benchmark.evaluate_report(altered)
              assert gate == "FAIL"
              assert "aggregation mismatch" in errors


          '''
          if s.count(marker) != 1:
              raise SystemExit('test insertion anchor mismatch')
          s = s.replace(marker, extra + marker)
          s = s.replace(
              '        "same_process": True,\n    }\n',
              '        "same_process": True,\n'
              '        "replicate_aggregation": benchmark.AGGREGATION,\n    }\n',
          )
          p.write_text(s, encoding='utf-8')
          PY
          python -m py_compile implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py
      - name: Install and run targeted gate
        run: |
          cd implementation
          python -m pip install -e '.[dev]'
          python -m pytest -q tests/test_b4_3b_performance_contract.py --tb=short
      - name: Commit patch and remove temporary workflow
        run: |
          set -euo pipefail
          rm .github/workflows/b4_3b3_diagnostic.yml
          git add implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py .github/workflows/b4_3b3_diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(b4.3b3): stabilize p95 with replicated evidence'
          git push origin HEAD:feat/b4.3b3-lifecycle-performance-gate
