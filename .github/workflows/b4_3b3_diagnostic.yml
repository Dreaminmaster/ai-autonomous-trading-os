name: B4.3B3 Targeted Diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_diagnostic.yml'
      - '.github/tmp/b4_3b3_benchmark.gz.b64'
      - '.github/tmp/b4_3b3_test.gz.b64'

permissions:
  contents: write

jobs:
  write-test-clean:
    if: github.head_ref == 'feat/b4.3b3-lifecycle-performance-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/b4.3b3-lifecycle-performance-gate
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Decode exact reviewed sources
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/tmp/b4_3b3_benchmark.gz.b64 | gzip -d > implementation/scripts/benchmark_b4_3b_lifecycle.py
          base64 -d .github/tmp/b4_3b3_test.gz.b64 | gzip -d > implementation/tests/test_b4_3b_performance_contract.py
          test "$(sha256sum implementation/scripts/benchmark_b4_3b_lifecycle.py | awk '{print $1}')" = '60c1b563ec05b5a28ae4fd18f002357ebf3a5e464f9c8c097cc075c39ff7948c'
          test "$(sha256sum implementation/tests/test_b4_3b_performance_contract.py | awk '{print $1}')" = '67ded4dfca4bcac5340b4aecc2076242f2f0faa40ccb8e7035eb12d8400a5c0e'
          python -m py_compile implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py
      - name: Install and run targeted performance contract
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m pip install -e '.[dev]'
          python -m pytest -q tests/test_b4_3b_performance_contract.py --tb=short
      - name: Commit reviewed sources and remove temporary assets
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/b4_3b3_diagnostic.yml
          rm .github/tmp/b4_3b3_benchmark.gz.b64 .github/tmp/b4_3b3_test.gz.b64
          git add implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py .github/workflows/b4_3b3_diagnostic.yml .github/tmp/b4_3b3_benchmark.gz.b64 .github/tmp/b4_3b3_test.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(b4.3b3): stabilize p95 with replicated evidence'
          git push origin HEAD:feat/b4.3b3-lifecycle-performance-gate
