name: B4.2A Simple CI Probe

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    env:
      TARGET_SHA: 4337b1bc471c16708782e450e11cc3fdfe6e6a0a
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ATOS dev
        run: python -m pip install -e 'implementation[dev]'

      - name: Probe Simple CI lookup
        id: probe
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          PYTHONPATH=implementation/src python - <<'PY'
          import json, os, urllib.request, traceback
          from atos.simple_ci_evidence import verify_simple_ci_for_sha

          target = os.environ['TARGET_SHA']
          token = os.environ['GITHUB_TOKEN']
          repo = 'Dreaminmaster/ai-autonomous-trading-os'
          headers = {
              'Authorization': 'Bearer ' + token,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          def api(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read())

          report = {'target_sha': target, 'workflow_path': '.github/workflows/ci.yml'}
          try:
              workflows = api(f'https://api.github.com/repos/{repo}/actions/workflows').get('workflows', [])
              ci = [w for w in workflows if w.get('path') == '.github/workflows/ci.yml' and w.get('name') == 'CI']
              report['matching_workflows'] = ci
              workflow_id = ci[0]['id'] if ci else None
              report['workflow_id'] = workflow_id
              runs = [] if workflow_id is None else api(
                  f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_id}/runs?head_sha={target}&per_page=20'
              ).get('workflow_runs', [])
              report['runs'] = [
                  {
                      'id': r.get('id'),
                      'head_sha': r.get('head_sha'),
                      'status': r.get('status'),
                      'conclusion': r.get('conclusion'),
                      'event': r.get('event'),
                      'head_branch': r.get('head_branch'),
                      'run_number': r.get('run_number'),
                  }
                  for r in runs
              ]
              result = verify_simple_ci_for_sha(target)
              report['verifier_result'] = result
              report['probe_status'] = 'PASS'
          except Exception as exc:
              report['probe_status'] = 'FAIL'
              report['error_type'] = type(exc).__name__
              report['error'] = str(exc)
              report['traceback'] = traceback.format_exc()
          with open('simple-ci-probe.json', 'w', encoding='utf-8') as f:
              json.dump(report, f, indent=2, sort_keys=True)
              f.write('\n')
          print(json.dumps(report, indent=2, sort_keys=True))
          raise SystemExit(0 if report['probe_status'] == 'PASS' else 1)
          PY

      - name: Upload probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-2a-simple-ci-probe
          path: simple-ci-probe.json
          if-no-files-found: error
          retention-days: 14
