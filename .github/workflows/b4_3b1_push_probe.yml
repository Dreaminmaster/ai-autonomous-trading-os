name: B4.3B1 Exact Push Probe

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ab462274cff69dd1ff14b71c67f921f3d85d4990
          fetch-depth: 1

      - name: Verify exact HEAD
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "ab462274cff69dd1ff14b71c67f921f3d85d4990"

      - name: Query exact push runs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: python
        run: |
          import json
          import os
          import urllib.request

          repo = "Dreaminmaster/ai-autonomous-trading-os"
          sha = "ab462274cff69dd1ff14b71c67f921f3d85d4990"
          branch = "feat/b4.3b1-typed-accounting-policy"
          token = os.environ["GH_TOKEN"]

          def api(url):
              req = urllib.request.Request(url)
              req.add_header("Authorization", "Bearer " + token)
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read())

          workflows = api(f"https://api.github.com/repos/{repo}/actions/workflows?per_page=100")["workflows"]
          targets = {
              "CI": ".github/workflows/ci.yml",
              "Freqtrade Validation": ".github/workflows/freqtrade-validation.yml",
          }
          result = {
              "target_sha": sha,
              "target_branch": branch,
              "workflows": {},
              "live": "FORBIDDEN",
          }

          for name, path in targets.items():
              matches = [w for w in workflows if w.get("name") == name and w.get("path") == path]
              if len(matches) != 1:
                  raise RuntimeError(f"workflow resolution failed for {name}: {len(matches)} matches")
              workflow_id = matches[0]["id"]
              data = api(
                  f"https://api.github.com/repos/{repo}/actions/workflows/{workflow_id}/runs"
                  f"?head_sha={sha}&per_page=100"
              )
              runs = []
              for run in data.get("workflow_runs", []):
                  if run.get("event") == "push" and run.get("head_branch") == branch:
                      runs.append({
                          "id": run.get("id"),
                          "event": run.get("event"),
                          "head_branch": run.get("head_branch"),
                          "head_sha": run.get("head_sha"),
                          "status": run.get("status"),
                          "conclusion": run.get("conclusion"),
                          "run_number": run.get("run_number"),
                          "created_at": run.get("created_at"),
                          "updated_at": run.get("updated_at"),
                      })
              result["workflows"][name] = {
                  "workflow_id": workflow_id,
                  "workflow_path": path,
                  "runs": runs,
              }

          with open("b4_3b1_push_probe.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2, sort_keys=True)

          print(json.dumps(result, indent=2, sort_keys=True))

      - name: Upload probe evidence
        uses: actions/upload-artifact@v4
        with:
          name: b4-3b1-push-probe
          path: b4_3b1_push_probe.json
          if-no-files-found: error
