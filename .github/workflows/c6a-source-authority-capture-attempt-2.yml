name: C6A Source Authority Capture Attempt 2

# This temporary workflow is triggered only by the main-branch commit that first
# adds this exact file. It has no workflow_dispatch, pull_request, schedule, or
# reusable-workflow entry. Any UI rerun is rejected before network access by the
# run-attempt guard and the file must be deleted after the result is frozen.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/c6a-source-authority-capture-attempt-2.yml

permissions:
  contents: read

concurrency:
  group: c6a-source-authority-capture-attempt-2
  cancel-in-progress: false

jobs:
  capture:
    name: exact remediated public metadata source capture
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      C6A_IMPLEMENTATION_SHA: bcb126d63436f253aad1aeac695ad325ad316899
      C6A_VALIDATED_PR_MERGE_REF: refs/pull/65/merge@eda36c041e8528c3f7d728d41d7863c62e9a00d9
      C6A_BUNDLE_DIR: ${{ github.workspace }}/c6a-source-authority-attempt-2-bundle
      C6A_PACKAGE_DIR: ${{ github.workspace }}/c6a-source-authority-attempt-2-bundle/package
    steps:
      - name: Reject any rerun before checkout or network access
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"

      - name: Checkout exact validated remediation
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: bcb126d63436f253aad1aeac695ad325ad316899
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify immutable execution identity
        shell: bash
        run: |
          set -euo pipefail
          observed="$(git rev-parse HEAD)"
          test "$observed" = "$C6A_IMPLEMENTATION_SHA"
          test "$(git status --porcelain)" = ""
          mkdir -p "$C6A_BUNDLE_DIR/workflow"
          printf 'implementation_sha=%s\n' "$observed" | tee "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'validated_pr_merge_ref=%s\n' "$C6A_VALIDATED_PR_MERGE_REF" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'trigger_commit=%s\n' "$GITHUB_SHA" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'workflow_ref=%s\n' "$GITHUB_WORKFLOW_REF" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'run_id=%s\n' "$GITHUB_RUN_ID" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'run_attempt=%s\n' "$GITHUB_RUN_ATTEMPT" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"

      - name: Run one-shot fail-closed source-authority attempt
        id: capture
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cd implementation
          PYTHONPATH=src python scripts/run_c6a_source_authority_gate.py \
            --inventory config/c6a_source_authority_query_inventory_v1.json \
            --output "$C6A_PACKAGE_DIR" \
            --source-commit-sha "$C6A_IMPLEMENTATION_SHA" \
            --pr-merge-ref "$C6A_VALIDATED_PR_MERGE_REF" \
            2>&1 | tee "$C6A_BUNDLE_DIR/workflow/capture.log"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build complete outer bundle manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_BUNDLE_DIR"])
          root.mkdir(parents=True, exist_ok=True)
          files = []
          for path in sorted(item for item in root.rglob("*") if item.is_file()):
              relative = path.relative_to(root).as_posix()
              if relative == "bundle-manifest.json":
                  continue
              data = path.read_bytes()
              files.append({
                  "path": relative,
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })
          payload = {
              "schema_version": 1,
              "stage": "C6A_SOURCE_AUTHORITY_CAPTURE_ATTEMPT_2_BUNDLE",
              "implementation_sha": os.environ["C6A_IMPLEMENTATION_SHA"],
              "validated_pr_merge_ref": os.environ["C6A_VALIDATED_PR_MERGE_REF"],
              "trigger_commit": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "files": files,
              "file_count": len(files),
              "implementation_authorized": False,
              "economic_data_access_authorized": False,
              "live_state": "LIVE_FORBIDDEN",
          }
          encoded = (json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n").encode()
          (root / "bundle-manifest.json").write_bytes(encoded)
          PY

      - name: Upload complete source-authority result bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c6a-source-authority-attempt-2-${{ github.run_id }}
          path: ${{ env.C6A_BUNDLE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 6

      - name: Publish non-authorizing result summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_PACKAGE_DIR"])
          gate = root / "gate_result.json"
          emergency = root / "emergency_failure.json"
          lines = [
              "## C6A source-authority attempt 2 result",
              "",
              f"- implementation SHA: `{os.environ['C6A_IMPLEMENTATION_SHA']}`",
              f"- validated PR merge ref: `{os.environ['C6A_VALIDATED_PR_MERGE_REF']}`",
              "- economic implementation authorized: `false`",
              "- live state: `LIVE_FORBIDDEN`",
          ]
          if gate.is_file():
              payload = json.loads(gate.read_text(encoding="utf-8"))
              lines.extend([
                  f"- gate status: `{payload.get('status')}`",
                  f"- gate result: `{payload.get('result')}`",
                  f"- independent review: `{payload.get('independent_review_status')}`",
              ])
          elif emergency.is_file():
              payload = json.loads(emergency.read_text(encoding="utf-8"))
              lines.extend([
                  "- gate status: `EMERGENCY_FAILURE`",
                  f"- error type: `{payload.get('error_type')}`",
              ])
          else:
              lines.append("- gate status: `ARTIFACT_MISSING`")
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Enforce execution and bundle integrity after upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status='${{ steps.capture.outputs.exit_code }}'
          if [ "$status" != "0" ]; then
            echo "Unexpected implementation/runtime failure was retained in the bundle (exit=$status)." >&2
            exit 1
          fi
          test -f "$C6A_PACKAGE_DIR/gate_result.json"
          test -f "$C6A_PACKAGE_DIR/independent_review.json"
          test -f "$C6A_PACKAGE_DIR/manifest.json"
          test -f "$C6A_BUNDLE_DIR/bundle-manifest.json"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_BUNDLE_DIR"])
          manifest = json.loads((root / "bundle-manifest.json").read_text(encoding="utf-8"))
          observed = {row["path"]: row for row in manifest["files"]}
          expected = {
              path.relative_to(root).as_posix(): path
              for path in root.rglob("*")
              if path.is_file() and path.name != "bundle-manifest.json"
          }
          if set(observed) != set(expected) or manifest.get("file_count") != len(expected):
              raise SystemExit("outer bundle manifest coverage mismatch")
          for relative, path in expected.items():
              data = path.read_bytes()
              row = observed[relative]
              if row.get("size") != len(data) or row.get("sha256") != hashlib.sha256(data).hexdigest():
                  raise SystemExit(f"outer bundle manifest mismatch: {relative}")
          gate = json.loads((Path(os.environ["C6A_PACKAGE_DIR"]) / "gate_result.json").read_text())
          if gate.get("implementation_authorized") is not False:
              raise SystemExit("gate improperly authorizes implementation")
          if gate.get("economic_data_access_authorized") is not False:
              raise SystemExit("gate improperly authorizes economic data access")
          if gate.get("live_state") != "LIVE_FORBIDDEN":
              raise SystemExit("gate live-state boundary drift")
          PY
