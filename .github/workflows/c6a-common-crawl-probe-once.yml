name: C6A Common Crawl Probe Once

# One bounded public-archive coverage probe. This workflow is triggered only by
# the main-branch commit that first adds this exact file. It has no manual,
# pull-request, scheduled, or reusable-workflow entry point. A UI rerun is
# rejected before checkout or network access, and this temporary file must be
# deleted after the retained result is independently frozen.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/c6a-common-crawl-probe-once.yml

permissions:
  contents: read

concurrency:
  group: c6a-common-crawl-probe-once
  cancel-in-progress: false

jobs:
  probe:
    name: exact bounded Common Crawl official-source coverage probe
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      C6A_PROBE_IMPLEMENTATION_SHA: 998d337fef8c01083b7a92693a2cbe570d410416
      C6A_VALIDATED_PR_MERGE_REF: refs/pull/80/merge@411b0847797b10e436dd24b47bbdc71e651f243a
      C6A_BUNDLE_DIR: ${{ github.workspace }}/c6a-common-crawl-probe-bundle
      C6A_PROBE_DIR: ${{ github.workspace }}/c6a-common-crawl-probe-bundle/probe

    steps:
      - name: Reject any rerun before checkout or network access
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"

      - name: Checkout exact reviewed probe implementation
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: 998d337fef8c01083b7a92693a2cbe570d410416
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify immutable execution identity
        shell: bash
        run: |
          set -euo pipefail
          observed="$(git rev-parse HEAD)"
          test "$observed" = "$C6A_PROBE_IMPLEMENTATION_SHA"
          test -z "$(git status --porcelain)"
          mkdir -p "$C6A_BUNDLE_DIR/workflow"
          printf 'implementation_sha=%s\n' "$observed" | tee "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'validated_pr_merge_ref=%s\n' "$C6A_VALIDATED_PR_MERGE_REF" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'trigger_commit=%s\n' "$GITHUB_SHA" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'workflow_ref=%s\n' "$GITHUB_WORKFLOW_REF" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'run_id=%s\n' "$GITHUB_RUN_ID" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"
          printf 'run_attempt=%s\n' "$GITHUB_RUN_ATTEMPT" | tee -a "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"

      - name: Run bounded Common Crawl coverage probe
        id: probe
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cd implementation
          env -u HTTP_PROXY -u HTTPS_PROXY -u ALL_PROXY \
              -u http_proxy -u https_proxy -u all_proxy \
              -u COOKIE -u COOKIES -u AUTHORIZATION -u PROXY_AUTHORIZATION \
              PYTHONPATH=src python scripts/run_c6a_common_crawl_probe.py \
                --output "$C6A_PROBE_DIR" \
                2>&1 | tee "$C6A_BUNDLE_DIR/workflow/probe.log"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build complete outer bundle manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_BUNDLE_DIR"])
          root.mkdir(parents=True, exist_ok=True)
          files = []
          for path in sorted(item for item in root.rglob("*") if item.is_file()):
              relative = path.relative_to(root).as_posix()
              if relative == "bundle-manifest.json":
                  continue
              data = path.read_bytes()
              files.append({
                  "path": relative,
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })
          payload = {
              "schema_version": 1,
              "stage": "C6A_COMMON_CRAWL_PROBE_BUNDLE",
              "implementation_sha": os.environ["C6A_PROBE_IMPLEMENTATION_SHA"],
              "validated_pr_merge_ref": os.environ["C6A_VALIDATED_PR_MERGE_REF"],
              "trigger_commit": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "files": files,
              "file_count": len(files),
              "common_crawl_probe_authorized": True,
              "article_expansion_authorized": False,
              "third_full_capture_authorized": False,
              "implementation_authorized": False,
              "economic_data_access_authorized": False,
              "paper_state": "PAPER_CLOSED",
              "shadow_state": "SHADOW_CLOSED",
              "live_state": "LIVE_FORBIDDEN",
          }
          encoded = (json.dumps(payload, sort_keys=True, separators=(",", ":")) + "\n").encode()
          (root / "bundle-manifest.json").write_bytes(encoded)
          PY

      - name: Upload complete probe result bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c6a-common-crawl-probe-${{ github.run_id }}
          path: ${{ env.C6A_BUNDLE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 6

      - name: Publish non-authorizing probe summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_PROBE_DIR"])
          result_path = root / "probe_result.json"
          review_path = root / "independent_review.json"
          lines = [
              "## C6A bounded Common Crawl coverage probe",
              "",
              f"- implementation SHA: `{os.environ['C6A_PROBE_IMPLEMENTATION_SHA']}`",
              f"- validated PR merge ref: `{os.environ['C6A_VALIDATED_PR_MERGE_REF']}`",
              "- Common Crawl probe authorized: `true` for this one invocation only",
              "- article expansion authorized: `false`",
              "- third full capture authorized: `false`",
              "- economic implementation authorized: `false`",
              "- live state: `LIVE_FORBIDDEN`",
          ]
          if result_path.is_file():
              result = json.loads(result_path.read_text(encoding="utf-8"))
              lines.extend([
                  f"- probe status: `{result.get('status')}`",
                  f"- probe result: `{result.get('result')}`",
                  f"- covered targets: `{result.get('covered_target_ids')}`",
                  f"- missing targets: `{result.get('missing_target_ids')}`",
              ])
          else:
              lines.append("- probe result: `ARTIFACT_MISSING_OR_RUNTIME_FAILURE`")
          if review_path.is_file():
              review = json.loads(review_path.read_text(encoding="utf-8"))
              lines.extend([
                  f"- independent review: `{review.get('status')}`",
                  f"- independent probe status: `{review.get('probe_status_recomputed')}`",
                  f"- coverage findings: `{review.get('coverage_findings')}`",
                  f"- review errors: `{review.get('errors')}`",
              ])
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Enforce reviewed result and bundle integrity after upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status='${{ steps.probe.outputs.exit_code }}'
          if [ "$status" != "0" ]; then
            echo "Common Crawl probe execution/review failed; retained bundle is non-authoritative (exit=$status)." >&2
            exit 1
          fi
          test -f "$C6A_PROBE_DIR/probe_result.json"
          test -f "$C6A_PROBE_DIR/independent_review.json"
          test -f "$C6A_PROBE_DIR/manifest.json"
          test -f "$C6A_BUNDLE_DIR/bundle-manifest.json"
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.parse import urlparse

          bundle = Path(os.environ["C6A_BUNDLE_DIR"])
          probe = Path(os.environ["C6A_PROBE_DIR"])

          outer = json.loads((bundle / "bundle-manifest.json").read_text())
          observed = {row["path"]: row for row in outer["files"]}
          expected = {
              path.relative_to(bundle).as_posix(): path
              for path in bundle.rglob("*")
              if path.is_file() and path.name != "bundle-manifest.json"
          }
          if set(observed) != set(expected) or outer.get("file_count") != len(expected):
              raise SystemExit("outer bundle manifest coverage mismatch")
          for relative, path in expected.items():
              data = path.read_bytes()
              row = observed[relative]
              if row.get("size") != len(data) or row.get("sha256") != hashlib.sha256(data).hexdigest():
                  raise SystemExit(f"outer bundle manifest mismatch: {relative}")

          inner = json.loads((probe / "manifest.json").read_text())
          inner_observed = {row["path"]: row for row in inner["files"]}
          inner_expected = {
              path.relative_to(probe).as_posix(): path
              for path in probe.rglob("*")
              if path.is_file() and path.name != "manifest.json"
          }
          if set(inner_observed) != set(inner_expected) or inner.get("file_count") != len(inner_expected):
              raise SystemExit("inner manifest coverage mismatch")
          for relative, path in inner_expected.items():
              data = path.read_bytes()
              row = inner_observed[relative]
              if row.get("size") != len(data) or row.get("sha256") != hashlib.sha256(data).hexdigest():
                  raise SystemExit(f"inner manifest mismatch: {relative}")

          result = json.loads((probe / "probe_result.json").read_text())
          review = json.loads((probe / "independent_review.json").read_text())
          if review.get("status") != "PASS" or review.get("errors") != []:
              raise SystemExit("independent review did not pass cleanly")
          if result.get("status") != review.get("probe_status_recomputed"):
              raise SystemExit("producer/reviewer status mismatch")
          if result.get("result") != review.get("probe_result_recomputed"):
              raise SystemExit("producer/reviewer result mismatch")
          allowed = {
              ("PASS", "COMMON_CRAWL_OFFICIAL_BYTES_AVAILABLE"),
              ("FAIL", "COMMON_CRAWL_COVERAGE_INSUFFICIENT"),
          }
          if (result.get("status"), result.get("result")) not in allowed:
              raise SystemExit("unexpected Common Crawl result state")
          if result.get("query_count") != 23 or result.get("target_count") != 7:
              raise SystemExit("frozen query inventory count drift")
          for row in result.get("query_results", []):
              if row.get("status") != "PASS":
                  raise SystemExit("index query execution failure in accepted package")
              selected = row.get("selected_count")
              fetch_status = row.get("record_fetch_status")
              if selected == 0 and fetch_status != "NOT_APPLICABLE":
                  raise SystemExit("no-hit record-fetch state mismatch")
              if selected == 1 and fetch_status != "PASS":
                  raise SystemExit("selected record was not successfully retained")
              if (urlparse(str(row.get("query_url", ""))).hostname or "").lower() != "index.commoncrawl.org":
                  raise SystemExit("query escaped Common Crawl index host")
          for row in result.get("record_results", []):
              if (urlparse(str(row.get("data_url", ""))).hostname or "").lower() != "data.commoncrawl.org":
                  raise SystemExit("record escaped Common Crawl data host")

          for payload_name, payload in (("result", result), ("review", review), ("inner", inner)):
              for key in (
                  "article_expansion_authorized",
                  "third_full_capture_authorized",
                  "implementation_authorized",
                  "economic_data_access_authorized",
              ):
                  if payload.get(key) is not False:
                      raise SystemExit(f"{payload_name} improperly authorizes {key}")
              if payload.get("live_state") != "LIVE_FORBIDDEN":
                  raise SystemExit(f"{payload_name} live-state drift")
          if outer.get("common_crawl_probe_authorized") is not True:
              raise SystemExit("outer one-shot authorization identity missing")
          for key in (
              "article_expansion_authorized",
              "third_full_capture_authorized",
              "implementation_authorized",
              "economic_data_access_authorized",
          ):
              if outer.get(key) is not False:
                  raise SystemExit(f"outer bundle improperly authorizes {key}")
          if outer.get("paper_state") != "PAPER_CLOSED" or outer.get("shadow_state") != "SHADOW_CLOSED" or outer.get("live_state") != "LIVE_FORBIDDEN":
              raise SystemExit("outer safety-state drift")
          if outer.get("implementation_sha") != os.environ["C6A_PROBE_IMPLEMENTATION_SHA"]:
              raise SystemExit("outer implementation SHA mismatch")
          if outer.get("validated_pr_merge_ref") != os.environ["C6A_VALIDATED_PR_MERGE_REF"]:
              raise SystemExit("outer merge-ref mismatch")
          if outer.get("run_id") != os.environ["GITHUB_RUN_ID"] or outer.get("run_attempt") != "1":
              raise SystemExit("outer run identity mismatch")
          PY
