name: B4.2A Exact Full Validation

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  exact-full-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      TARGET_SHA: 4337b1bc471c16708782e450e11cc3fdfe6e6a0a
      CANDIDATE_BRANCH: feat/b4.2a-execution-persistence-schema
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify exact HEAD
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          echo "TARGET_SHA=$TARGET_SHA"
          echo "ACTUAL_SHA=$actual"
          test "$actual" = "$TARGET_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ATOS dev dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Py compile
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            implementation/src/atos/runtime_migrations.py \
            implementation/tests/test_execution_persistence_schema.py

      - name: Import smoke
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=implementation/src python - <<'PY'
          from atos.runtime_migrations import MIGRATION_PLAN
          from atos.runtime_db import RuntimeDatabase
          assert [m.version for m in MIGRATION_PLAN] == [1, 2, 3]
          print([m.version for m in MIGRATION_PLAN])
          PY

      - name: ATOS full pytest
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q implementation/tests --tb=short 2>&1 | tee implementation/pytest.log

      - name: Secret leakage scan
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          bash scripts/validate_no_secrets.sh 2>&1 | tee no_secret_scan.log

      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m atos.cli status
          python -m atos.cli risk
          python -m atos.cli cycle
          python -m atos.cli review
          python -m atos.cli_ext evaluate

      - name: Walk-forward report
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          mkdir -p freqtrade_data/backtest_results
          python3 scripts/ci_walk_forward.py

      - name: Generate exact ATOS evidence manifest
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          GITHUB_SHA="$TARGET_SHA" GITHUB_RUN_ID="$GITHUB_RUN_ID" python scripts/generate_evidence_manifest.py atos-tests
          GITHUB_SHA="$TARGET_SHA" GITHUB_RUN_ID="$GITHUB_RUN_ID" python scripts/preflight_evidence_artifact.py atos-tests
          mkdir -p ../atos_artifacts/freqtrade_data/backtest_results
          cp evidence_manifest.json ../atos_artifacts/evidence_manifest.json
          cp pytest.log ../atos_artifacts/pytest.log
          cp no_secret_scan.log ../atos_artifacts/no_secret_scan.log
          cp freqtrade_data/backtest_results/walk_forward_report.json ../atos_artifacts/freqtrade_data/backtest_results/walk_forward_report.json

      - name: Install Freqtrade dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m pip install -e '.[freqtrade]'
          python -c "import freqtrade; print('Freqtrade', freqtrade.__version__)"

      - name: Setup Freqtrade
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          bash scripts/setup_freqtrade.sh
          cp config/policy.validation.json config/policy.json

      - name: List strategies
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          freqtrade list-strategies --strategy-path freqtrade_data/strategies 2>&1 | tee freqtrade_list_strategies.log
          grep -q "AISupervisedStrategy" freqtrade_list_strategies.log

      - name: Download OKX data
        timeout-minutes: 15
        continue-on-error: true
        shell: bash
        run: |
          cd implementation
          mkdir -p freqtrade_data/data/okx
          freqtrade download-data --config freqtrade_data/config.dryrun.json --datadir freqtrade_data/data/okx --exchange okx --pairs BTC/USDT --timeframes 5m --timerange 20250101-20250701 2>&1 | tee download_data.log
          ls freqtrade_data/data/okx/ || true

      - name: Production-path safety test
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m pytest tests/test_no_lookahead_strategy.py::test_resolve_candle_ts_reads_only_current_row_production_path -v --no-header -s

      - name: Generate exact Freqtrade evidence manifest
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          GITHUB_SHA="$TARGET_SHA" GITHUB_RUN_ID="$GITHUB_RUN_ID" python scripts/generate_evidence_manifest.py freqtrade

      - name: Canonical fresh baseline
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python3 scripts/run_canonical_backtest.py canonical_baseline canonical_baseline config/policy.validation.json
          RUN_LOOKAHEAD=1 python3 scripts/run_canonical_backtest.py canonical_baseline_la canonical_baseline_la config/policy.validation.json

      - name: Multi-period baseline multipair attribution
        continue-on-error: true
        shell: bash
        env:
          ATOS_POLICY: config/policy.validation.json
        run: |
          cd implementation
          mkdir -p validation_reports
          python3 scripts/ci_multi_period.py
          python3 scripts/ci_baselines.py
          python3 scripts/ci_multipair_attribution.py

      - name: Validate pair format
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python3 - <<'PY'
          import json
          cfg = json.load(open('freqtrade_data/config.dryrun.json'))
          pairs = cfg.get('exchange', {}).get('pair_whitelist', [])
          for pair in pairs:
              if ':USDT' in pair:
                  raise SystemExit(f'ERROR: {pair}')
              print(f'OK: {pair}')
          print('Pair format validated.')
          PY

      - name: Strategy Fix Round 1 exact SHA
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          mkdir -p validation_reports
          GITHUB_SHA="$TARGET_SHA" GITHUB_RUN_ID="$GITHUB_RUN_ID" python3 scripts/ci_strategy_fix_round1.py

      - name: Preflight exact Freqtrade evidence
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          GITHUB_SHA="$TARGET_SHA" GITHUB_RUN_ID="$GITHUB_RUN_ID" python scripts/preflight_evidence_artifact.py freqtrade

      - name: Stage exact Freqtrade artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          mkdir -p ../freqtrade_artifacts/freqtrade_data/backtest_results ../freqtrade_artifacts/validation_reports
          cp evidence_manifest.json ../freqtrade_artifacts/evidence_manifest.json
          cp freqtrade_data/backtest_results/canonical_baseline_summary.json ../freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_summary.json
          cp freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json ../freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json
          cp validation_reports/strategy_fix_round1.json ../freqtrade_artifacts/validation_reports/strategy_fix_round1.json
          cp validation_reports/strategy_fix_round1.md ../freqtrade_artifacts/validation_reports/strategy_fix_round1.md
          cp freqtrade_data/backtest_results/round1_*_la_lookahead_status.json ../freqtrade_artifacts/freqtrade_data/backtest_results/

      - name: Bind Simple CI evidence to exact candidate push
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd implementation
          python - <<'PY'
          import json
          import os
          import urllib.request
          from atos.evidence_summary import write_json_atomic

          target = os.environ['TARGET_SHA']
          branch = os.environ['CANDIDATE_BRANCH']
          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          headers = {
              'Authorization': 'Bearer ' + token,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          def api(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read())

          workflows = api(f'https://api.github.com/repos/{repo}/actions/workflows').get('workflows', [])
          matches = [
              w for w in workflows
              if w.get('path') == '.github/workflows/ci.yml'
              and w.get('name') == 'CI'
              and w.get('state') == 'active'
          ]
          if len(matches) != 1:
              raise RuntimeError(f'Expected exactly one active CI workflow, got {len(matches)}')
          workflow_id = matches[0]['id']
          runs = api(
              f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_id}/runs?head_sha={target}&per_page=100'
          ).get('workflow_runs', [])
          candidates = [
              r for r in runs
              if r.get('head_sha') == target
              and r.get('event') == 'push'
              and r.get('head_branch') == branch
          ]
          if len(candidates) != 1:
              brief = [
                  {
                      'id': r.get('id'),
                      'event': r.get('event'),
                      'head_branch': r.get('head_branch'),
                      'head_sha': r.get('head_sha'),
                      'status': r.get('status'),
                      'conclusion': r.get('conclusion'),
                  }
                  for r in candidates
              ]
              raise RuntimeError(f'Expected exactly one exact candidate push CI run, got {len(candidates)}: {brief}')
          run = candidates[0]
          if run.get('status') != 'completed':
              raise RuntimeError(f"Simple CI not completed: {run.get('status')}")
          if run.get('conclusion') != 'success':
              raise RuntimeError(f"Simple CI not successful: {run.get('conclusion')}")

          result = {
              'schema_version': 1,
              'workflow_id': workflow_id,
              'workflow_name': 'CI',
              'workflow_path': '.github/workflows/ci.yml',
              'run_id': run['id'],
              'head_sha': target,
              'status': run['status'],
              'conclusion': run['conclusion'],
              'verified': True,
              'selection_policy': 'exact workflow + exact SHA + push event + exact candidate branch',
              'selected_event': run['event'],
              'selected_head_branch': run['head_branch'],
          }
          write_json_atomic('simple_ci_evidence.json', result)
          print(json.dumps(result, indent=2, sort_keys=True))
          PY

      - name: Run exact evidence summary
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m atos.evidence_summary "$TARGET_SHA" "$GITHUB_RUN_ID" success success ../atos_artifacts ../freqtrade_artifacts simple_ci_evidence.json

      - name: Verify exact summary PASS
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python - <<'PY'
          import json, os
          data = json.load(open('validation_summary.json'))
          assert data['head_sha'] == os.environ['TARGET_SHA'], data
          assert data['gate_status'] == 'PASS', data
          assert data['live'] == 'FORBIDDEN', data
          assert data['errors'] == [], data
          print(json.dumps(data, indent=2))
          PY

      - name: Upload exact full evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-2a-exact-full-validation
          path: |
            implementation/validation_summary.json
            implementation/validation_summary.md
            implementation/simple_ci_evidence.json
            atos_artifacts/evidence_manifest.json
            atos_artifacts/pytest.log
            atos_artifacts/no_secret_scan.log
            atos_artifacts/freqtrade_data/backtest_results/walk_forward_report.json
            freqtrade_artifacts/evidence_manifest.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_summary.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json
            freqtrade_artifacts/freqtrade_data/backtest_results/round1_*_la_lookahead_status.json
            freqtrade_artifacts/validation_reports/strategy_fix_round1.json
            freqtrade_artifacts/validation_reports/strategy_fix_round1.md
          if-no-files-found: warn
          retention-days: 90
