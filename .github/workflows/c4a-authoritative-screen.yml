name: C4A Final Evidence Recovery

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  actions: read

jobs:
  recover-final-evidence:
    if: github.event.pull_request.number == 50
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      C4A_SOURCE_SHA: 7723aec183a07dd654a1c3740e75bdcc47133fbe
      C4A_BASE_SHA: 96015f9f15c04a4a834878bb32215194ce05c7eb
      C4A_ECONOMIC_WORKFLOW_HEAD_SHA: c957598ef3f1186c6410c1512b15dbc18d8ec1b2
      C4A_ECONOMIC_MERGE_REF_SHA: e1374be21e701c1b0341cf32a2922b781bbaabca
      C4A_ECONOMIC_RUN_ID: "29746643601"
      C4A_ECONOMIC_ARTIFACT_ID: "8462729263"
      C4A_ECONOMIC_ARTIFACT_NAME: c4a-authoritative-evidence-29746643601
      C4A_ECONOMIC_ARTIFACT_DIGEST: sha256:847ded9dde4e8ac55b77477f919f8acda15620db676557e4ed370fd896c59b0d
      C4A_PREVIOUS_RECOVERY_HEAD_SHA: 9ec3c09498cac0e64e94612bcefaa18b0497a8ec
      C4A_PREVIOUS_RECOVERY_RUN_ID: "29746982365"
      C4A_PREVIOUS_RECOVERY_ARTIFACT_ID: "8462829468"
      C4A_PREVIOUS_RECOVERY_ARTIFACT_DIGEST: sha256:10182c2f37e7ad0ed05f88bf57817367a495702f1983ff5a627b98c6ed77b43b
      C4A_MERGE_REF_SHA: e1374be21e701c1b0341cf32a2922b781bbaabca
      C4A_RECOVERY_MERGE_REF_SHA: ${{ github.sha }}
      C4A_RECOVERY_WORKFLOW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      C4A_RESULTS: implementation/freqtrade_data/backtest_results/c4a_large_liquid_cross_sectional_momentum
      C4A_PROVENANCE: implementation/freqtrade_data/c4a_workflow_provenance
      C4A_RECOVERY_PROVENANCE: implementation/freqtrade_data/c4a_recovery_provenance
      PYTHONHASHSEED: "0"
      TZ: UTC

    steps:
      - name: Checkout recovery PR merge ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bind frozen source, immutable economic artifact, and workflow-only recovery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$C4A_RECOVERY_PROVENANCE"
          printf '%s\n' exact-recovery-binding > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          test "${{ github.event.pull_request.number }}" = "50"
          test "${{ github.event.pull_request.head.ref }}" = "feat/c4a-large-liquid-cross-sectional-momentum"
          test "${{ github.event.pull_request.base.sha }}" = "$C4A_BASE_SHA"
          test "$(git rev-parse HEAD)" = "$C4A_RECOVERY_MERGE_REF_SHA"
          for sha in \
            "$C4A_BASE_SHA" \
            "$C4A_SOURCE_SHA" \
            "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA" \
            "$C4A_PREVIOUS_RECOVERY_HEAD_SHA" \
            "$C4A_RECOVERY_WORKFLOW_HEAD_SHA"; do
            git cat-file -e "$sha^{commit}"
          done
          git merge-base --is-ancestor "$C4A_BASE_SHA" "$C4A_SOURCE_SHA"
          git merge-base --is-ancestor "$C4A_SOURCE_SHA" "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA"
          git merge-base --is-ancestor "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA" "$C4A_PREVIOUS_RECOVERY_HEAD_SHA"
          git merge-base --is-ancestor "$C4A_PREVIOUS_RECOVERY_HEAD_SHA" "$C4A_RECOVERY_WORKFLOW_HEAD_SHA"
          test "$(git rev-list --count "$C4A_SOURCE_SHA..$C4A_ECONOMIC_WORKFLOW_HEAD_SHA")" = "4"
          test "$(git rev-list --count "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA..$C4A_PREVIOUS_RECOVERY_HEAD_SHA")" = "1"
          test "$(git rev-list --count "$C4A_PREVIOUS_RECOVERY_HEAD_SHA..$C4A_RECOVERY_WORKFLOW_HEAD_SHA")" = "1"
          test "$(git rev-list --count "$C4A_SOURCE_SHA..$C4A_RECOVERY_WORKFLOW_HEAD_SHA")" = "6"
          mapfile -t changed < <(git diff --name-only "$C4A_SOURCE_SHA" "$C4A_RECOVERY_WORKFLOW_HEAD_SHA")
          test "${#changed[@]}" = "1"
          test "${changed[0]}" = ".github/workflows/c4a-authoritative-screen.yml"
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "PASS",
              "recovery_mode": "EVIDENCE_ONLY_NO_ECONOMIC_RERUN",
              "recovery_attempt": 2,
              "pull_request": 50,
              "event": os.environ["GITHUB_EVENT_NAME"],
              "source_head_sha": os.environ["C4A_SOURCE_SHA"],
              "economic_workflow_head_sha": os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"],
              "economic_merge_ref_sha": os.environ["C4A_ECONOMIC_MERGE_REF_SHA"],
              "previous_recovery_head_sha": os.environ["C4A_PREVIOUS_RECOVERY_HEAD_SHA"],
              "recovery_workflow_head_sha": os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              "recovery_merge_ref_sha": os.environ["C4A_RECOVERY_MERGE_REF_SHA"],
              "checked_out_sha": git("rev-parse", "HEAD"),
              "source_to_economic_commit_count": 4,
              "economic_to_previous_recovery_commit_count": 1,
              "previous_to_current_recovery_commit_count": 1,
              "source_to_recovery_commit_count": 6,
              "source_to_recovery_changed_files": git(
                  "diff",
                  "--name-only",
                  os.environ["C4A_SOURCE_SHA"],
                  os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              ).splitlines(),
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          path = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"]) / "recovery_binding.json"
          path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          PY

      - name: Verify immutable economic artifact and previous recovery incident
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' verify-artifacts > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def fetch(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          economic_run = fetch(
              f"https://api.github.com/repos/{repo}/actions/runs/{os.environ['C4A_ECONOMIC_RUN_ID']}"
          )
          economic_artifact = fetch(
              f"https://api.github.com/repos/{repo}/actions/artifacts/{os.environ['C4A_ECONOMIC_ARTIFACT_ID']}"
          )
          recovery_run = fetch(
              f"https://api.github.com/repos/{repo}/actions/runs/{os.environ['C4A_PREVIOUS_RECOVERY_RUN_ID']}"
          )
          recovery_artifact = fetch(
              f"https://api.github.com/repos/{repo}/actions/artifacts/{os.environ['C4A_PREVIOUS_RECOVERY_ARTIFACT_ID']}"
          )

          assert economic_run["name"] == "C4A Authoritative Screen"
          assert economic_run["status"] == "completed"
          assert economic_run["conclusion"] == "failure"
          assert economic_run["head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert economic_artifact["name"] == os.environ["C4A_ECONOMIC_ARTIFACT_NAME"]
          assert str(economic_artifact["id"]) == os.environ["C4A_ECONOMIC_ARTIFACT_ID"]
          assert economic_artifact["digest"] == os.environ["C4A_ECONOMIC_ARTIFACT_DIGEST"]
          assert economic_artifact["expired"] is False

          assert recovery_run["name"] == "C4A Authoritative Evidence Recovery"
          assert recovery_run["status"] == "completed"
          assert recovery_run["conclusion"] == "failure"
          assert recovery_run["head_sha"] == os.environ["C4A_PREVIOUS_RECOVERY_HEAD_SHA"]
          assert str(recovery_artifact["id"]) == os.environ["C4A_PREVIOUS_RECOVERY_ARTIFACT_ID"]
          assert recovery_artifact["digest"] == os.environ["C4A_PREVIOUS_RECOVERY_ARTIFACT_DIGEST"]
          assert recovery_artifact["expired"] is False

          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "PASS",
              "economic_artifact": {
                  "run_id": economic_run["id"],
                  "run_number": economic_run["run_number"],
                  "workflow_head_sha": economic_run["head_sha"],
                  "artifact_id": economic_artifact["id"],
                  "artifact_name": economic_artifact["name"],
                  "artifact_digest": economic_artifact["digest"],
                  "artifact_size_in_bytes": economic_artifact["size_in_bytes"],
              },
              "previous_recovery_incident": {
                  "run_id": recovery_run["id"],
                  "run_number": recovery_run["run_number"],
                  "workflow_head_sha": recovery_run["head_sha"],
                  "artifact_id": recovery_artifact["id"],
                  "artifact_digest": recovery_artifact["digest"],
                  "classification": "EVIDENCE_RECOVERY_FAILURE",
                  "failed_phase": "independent-finalization-recovery",
                  "cause": "the frozen postprocessor indexed retained candle timestamps with a space separator while ledger events used the equivalent ISO T separator",
                  "economic_screen_rerun": False,
                  "authoritative_result_claimed": False,
              },
              "current_recovery": {
                  "method": "runtime-only canonical timestamp lookup shim",
                  "scope": "evidence postprocessing only",
                  "economic_screen_rerun": False,
                  "primitive_candle_values_modified": False,
                  "economic_result_values_modified": False,
              },
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          path = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"]) / "artifact_and_incident_binding.json"
          path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          PY

      - name: Checkout frozen economic source
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' checkout-source > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          git checkout --detach "$C4A_SOURCE_SHA"
          test "$(git rev-parse HEAD)" = "$C4A_SOURCE_SHA"
          test ! -e .github/workflows/c4a-authoritative-screen.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: implementation/pyproject.toml

      - name: Install frozen independent-finalization dependencies
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' install-finalizer > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Download immutable completed economic artifact
        uses: actions/download-artifact@v4
        with:
          name: c4a-authoritative-evidence-29746643601
          path: recovered_c4a_artifact
          github-token: ${{ github.token }}
          repository: Dreaminmaster/ai-autonomous-trading-os
          run-id: 29746643601

      - name: Restore and verify primitive evidence without rerunning economics
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' restore-primitive-evidence > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/decision.json
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/run_summary.json
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/input_candles/BTC_USDT_4h.json
          rm -rf "$C4A_RESULTS" "$C4A_PROVENANCE"
          mkdir -p "$(dirname "$C4A_RESULTS")" "$(dirname "$C4A_PROVENANCE")"
          cp -a \
            recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum \
            "$C4A_RESULTS"
          cp -a recovered_c4a_artifact/c4a_workflow_provenance "$C4A_PROVENANCE"
          mkdir -p "$C4A_RESULTS/workflow_provenance"
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_RESULTS/workflow_provenance/"
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_PROVENANCE/"
          python - <<'PY'
          import json
          import os
          import pathlib

          root = pathlib.Path(os.environ["C4A_RESULTS"])
          summary = json.loads((root / "run_summary.json").read_text(encoding="utf-8"))
          decision = json.loads((root / "decision.json").read_text(encoding="utf-8"))
          exact = json.loads(
              (root / "workflow_provenance" / "exact_binding.json").read_text(encoding="utf-8")
          )
          failure = json.loads(
              (root / "workflow_provenance" / "workflow_failure.json").read_text(encoding="utf-8")
          )
          assert summary["status"] == "PASS" and summary["errors"] == []
          assert summary["economic_result"] == "REJECTED"
          assert summary["selected_policy"] is None
          assert decision["economic_result"] == "REJECTED"
          assert decision["selected_policy"] is None
          assert summary["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert summary["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert exact["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert exact["workflow_head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert exact["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert failure["status"] == "EVIDENCE_FAILURE"
          assert failure["failed_phase"] == "independent-finalization"
          assert failure["economic_result"] is None
          assert summary["policy_row_count"] == 27
          assert summary["comparator_row_count"] == 36
          assert summary["result_pointer_count"] == 63
          assert summary["result_export_count"] == 63
          assert summary["weekly_schedule_count"] == 120
          assert summary["weekly_signal_row_count"] == 960
          assert summary["dsr_observations_per_policy"] == 39
          candles = sorted((root / "input_candles").glob("*_4h.json"))
          assert len(candles) == 12
          assert all(len(json.loads(path.read_text(encoding="utf-8"))) == 2376 for path in candles)
          for payload in (summary, decision, exact, failure):
              assert payload.get("holdout_state") == "HOLDOUT_CLOSED"
              assert payload.get("live") == "FORBIDDEN"
              assert payload.get("confirmation_opened", False) is False
          print("immutable primitive C4A evidence verified; no economic rerun")
          PY

      - name: Create audited timestamp-normalization finalization runner
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' create-timestamp-shim > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          cat > "$C4A_RECOVERY_PROVENANCE/timestamp_normalization_runner.py" <<'PY'
          from __future__ import annotations

          import sys
          from datetime import datetime
          from pathlib import Path
          from typing import Mapping

          implementation_root = Path(__file__).resolve().parents[2]
          sys.path.insert(0, str(implementation_root))
          sys.path.insert(0, str(implementation_root / "src"))

          import scripts.c4a_evidence_postprocess as postprocess
          import scripts.c4a_finalizer_extensions as extensions
          import scripts.c4a_source_inventory as source_inventory
          import scripts.complete_c4a_manifest as complete_manifest
          import scripts.finalize_c4a_evidence as base_finalizer


          def normalized_lookup(
              market: Mapping[str, Mapping[str, Mapping[str, float]]],
              pair: str,
              timestamp: str,
              field: str,
          ) -> float:
              variants: list[str] = []
              for value in (
                  timestamp,
                  timestamp.replace("T", " "),
                  timestamp.replace(" ", "T"),
                  timestamp.replace("+00:00", "Z"),
                  timestamp.replace("Z", "+00:00"),
              ):
                  if value not in variants:
                      variants.append(value)
              parsed = datetime.fromisoformat(timestamp.replace("Z", "+00:00"))
              for value in (
                  parsed.isoformat(),
                  str(parsed),
                  parsed.isoformat().replace("+00:00", "Z"),
              ):
                  if value not in variants:
                      variants.append(value)
              for variant in variants:
                  row = market[pair].get(variant)
                  if row is not None:
                      value = float(row[field])
                      if value <= 0:
                          raise postprocess.C4AEvidencePostprocessError(
                              f"non-positive {field} price for {pair}"
                          )
                      return value
              raise postprocess.C4AEvidencePostprocessError(
                  f"missing {field} price for {pair} at {timestamp}"
              )


          def main() -> int:
              source_inventory.main()
              base_finalizer.main()
              postprocess._lookup_price = normalized_lookup
              postprocess.main()
              extensions.main()
              complete_manifest.main()
              print("C4A evidence-only timestamp-normalization recovery PASS")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib

          recovery = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"])
          runner = recovery / "timestamp_normalization_runner.py"
          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "PASS",
              "shim_path": "workflow_provenance/timestamp_normalization_runner.py",
              "shim_sha256": hashlib.sha256(runner.read_bytes()).hexdigest(),
              "scope": "equivalent UTC timestamp string lookup only: ISO T, space separator, +00:00, and Z",
              "economic_screen_rerun": False,
              "primitive_candle_values_modified": False,
              "primitive_event_values_modified": False,
              "economic_result_values_modified": False,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          (recovery / "timestamp_normalization_shim.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_RESULTS/workflow_provenance/"
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_PROVENANCE/"

      - name: Run frozen independent finalization with audited timestamp shim
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' timestamp-shim-finalization > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          cp "$C4A_RECOVERY_PROVENANCE/current_phase.txt" "$C4A_RESULTS/workflow_provenance/recovery_current_phase.txt"
          cd implementation
          set -o pipefail
          PYTHONPATH="src:." python \
            freqtrade_data/c4a_recovery_provenance/timestamp_normalization_runner.py \
            2>&1 | tee freqtrade_data/c4a_workflow_provenance/c4a_timestamp_recovery.log

      - name: Independently verify recovered final artifact
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' recovered-pre-upload-verification > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib

          root = pathlib.Path(os.environ["C4A_RESULTS"])

          def load(name: str):
              return json.loads((root / name).read_text(encoding="utf-8"))

          summary = load("run_summary.json")
          decision = load("decision.json")
          final = load("final_evidence.json")
          inventory = load("source_inventory.json")
          snapshots = load("source_snapshot_index.json")
          manifest = load("manifest.json")
          preverify = load("pre_manifest_verification.json")
          economic_binding = load("workflow_provenance/exact_binding.json")
          recovery_binding = load("workflow_provenance/recovery_binding.json")
          artifact_binding = load("workflow_provenance/artifact_and_incident_binding.json")
          shim = load("workflow_provenance/timestamp_normalization_shim.json")

          assert summary["status"] == "PASS" and summary["errors"] == []
          assert summary["evidence_postprocess_status"] == "PASS"
          assert summary["rebalance_ledger_entry_count"] == 360
          assert final["status"] == "PASS" and final["errors"] == []
          assert final["checks_passed"] == 20
          assert decision["economic_result"] == "REJECTED"
          assert decision["selected_policy"] is None
          assert summary["economic_result"] == "REJECTED"
          assert summary["selected_policy"] is None
          assert summary["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert summary["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert inventory["status"] == "PASS" and inventory["file_count"] == 28
          assert snapshots["status"] == "PASS" and snapshots["snapshot_count"] == 28
          assert preverify["status"] == "PASS"
          assert len(load("candidate_universe.json")) == 12
          assert len(load("selected_universe.json")) == 8
          assert economic_binding["workflow_head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert economic_binding["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert recovery_binding["recovery_mode"] == "EVIDENCE_ONLY_NO_ECONOMIC_RERUN"
          assert recovery_binding["source_to_recovery_commit_count"] == 6
          assert recovery_binding["recovery_workflow_head_sha"] == os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"]
          assert recovery_binding["recovery_merge_ref_sha"] == os.environ["C4A_RECOVERY_MERGE_REF_SHA"]
          assert artifact_binding["economic_artifact"]["artifact_id"] == int(
              os.environ["C4A_ECONOMIC_ARTIFACT_ID"]
          )
          assert artifact_binding["economic_artifact"]["artifact_digest"] == os.environ[
              "C4A_ECONOMIC_ARTIFACT_DIGEST"
          ]
          assert artifact_binding["current_recovery"]["economic_screen_rerun"] is False
          runner = root / shim["shim_path"]
          assert runner.is_file()
          assert hashlib.sha256(runner.read_bytes()).hexdigest() == shim["shim_sha256"]
          assert shim["economic_screen_rerun"] is False
          assert shim["primitive_candle_values_modified"] is False
          assert shim["economic_result_values_modified"] is False

          pointers = sorted(root.rglob(".last_result.json"))
          exports = sorted(root.rglob("result.json"))
          assert len(pointers) == 63 and len(exports) == 63
          referenced = set()
          for pointer in pointers:
              payload = json.loads(pointer.read_text(encoding="utf-8"))
              result = pointer.parent / payload["latest"]
              assert result.is_file()
              assert hashlib.sha256(result.read_bytes()).hexdigest() == payload["sha256"]
              referenced.add(result.resolve())
          assert referenced == {path.resolve() for path in exports}

          listed = {item["path"]: item for item in manifest["files"]}
          actual = {
              str(path.relative_to(root)): path
              for path in root.rglob("*")
              if path.is_file() and path.name != "manifest.json"
          }
          assert set(listed) == set(actual)
          assert manifest["file_count"] == len(listed)
          for relative, path in actual.items():
              assert listed[relative]["size"] == path.stat().st_size
              assert listed[relative]["sha256"] == hashlib.sha256(path.read_bytes()).hexdigest()

          for payload in (
              summary,
              decision,
              final,
              inventory,
              snapshots,
              manifest,
              preverify,
              recovery_binding,
              artifact_binding,
              shim,
          ):
              assert payload.get("holdout_state") == "HOLDOUT_CLOSED"
              assert payload.get("live") == "FORBIDDEN"
              assert payload.get("confirmation_opened", False) is False

          print(
              "C4A recovered final artifact PASS:",
              decision["economic_result"],
              decision["selected_policy"],
              manifest["file_count"],
          )
          PY

      - name: Record recovery failure without changing economic evidence
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          phase="UNKNOWN"
          if [ -f "$C4A_RECOVERY_PROVENANCE/current_phase.txt" ]; then
            phase="$(cat "$C4A_RECOVERY_PROVENANCE/current_phase.txt")"
          fi
          mkdir -p "$C4A_RECOVERY_PROVENANCE"
          PHASE="$phase" python - <<'PY'
          import json
          import os
          import pathlib

          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "EVIDENCE_RECOVERY_FAILURE",
              "failed_phase": os.environ.get("PHASE", "UNKNOWN"),
              "source_head_sha": os.environ["C4A_SOURCE_SHA"],
              "economic_workflow_head_sha": os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"],
              "economic_merge_ref_sha": os.environ["C4A_ECONOMIC_MERGE_REF_SHA"],
              "recovery_workflow_head_sha": os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              "recovery_merge_ref_sha": os.environ["C4A_RECOVERY_MERGE_REF_SHA"],
              "economic_screen_rerun": False,
              "authoritative_result_claimed": False,
              "selected_policy": None,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          recovery = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"])
          recovery.mkdir(parents=True, exist_ok=True)
          (recovery / "recovery_failure.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY

      - name: Upload recovered C4A final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c4a-final-evidence-recovered-${{ github.run_id }}
          path: |
            implementation/freqtrade_data/backtest_results/c4a_large_liquid_cross_sectional_momentum
            implementation/freqtrade_data/c4a_workflow_provenance
            implementation/freqtrade_data/c4a_recovery_provenance
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
