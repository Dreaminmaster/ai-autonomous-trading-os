name: C4A Authoritative Evidence Recovery

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read
  actions: read

jobs:
  recover-final-evidence:
    if: github.event.pull_request.number == 50
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      C4A_SOURCE_SHA: 7723aec183a07dd654a1c3740e75bdcc47133fbe
      C4A_BASE_SHA: 96015f9f15c04a4a834878bb32215194ce05c7eb
      C4A_ECONOMIC_WORKFLOW_HEAD_SHA: c957598ef3f1186c6410c1512b15dbc18d8ec1b2
      C4A_ECONOMIC_MERGE_REF_SHA: e1374be21e701c1b0341cf32a2922b781bbaabca
      C4A_ECONOMIC_RUN_ID: "29746643601"
      C4A_ECONOMIC_ARTIFACT_ID: "8462729263"
      C4A_ECONOMIC_ARTIFACT_NAME: c4a-authoritative-evidence-29746643601
      C4A_ECONOMIC_ARTIFACT_DIGEST: sha256:847ded9dde4e8ac55b77477f919f8acda15620db676557e4ed370fd896c59b0d
      C4A_MERGE_REF_SHA: e1374be21e701c1b0341cf32a2922b781bbaabca
      C4A_RECOVERY_MERGE_REF_SHA: ${{ github.sha }}
      C4A_RECOVERY_WORKFLOW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      C4A_RESULTS: implementation/freqtrade_data/backtest_results/c4a_large_liquid_cross_sectional_momentum
      C4A_PROVENANCE: implementation/freqtrade_data/c4a_workflow_provenance
      C4A_RECOVERY_PROVENANCE: implementation/freqtrade_data/c4a_recovery_provenance
      PYTHONHASHSEED: "0"
      TZ: UTC

    steps:
      - name: Checkout recovery PR merge ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bind frozen source, economic artifact, and workflow-only recovery head
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$C4A_RECOVERY_PROVENANCE"
          printf '%s\n' exact-recovery-binding > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          test "${{ github.event.pull_request.number }}" = "50"
          test "${{ github.event.pull_request.head.ref }}" = "feat/c4a-large-liquid-cross-sectional-momentum"
          test "${{ github.event.pull_request.base.sha }}" = "$C4A_BASE_SHA"
          test "$(git rev-parse HEAD)" = "$C4A_RECOVERY_MERGE_REF_SHA"
          for sha in \
            "$C4A_BASE_SHA" \
            "$C4A_SOURCE_SHA" \
            "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA" \
            "$C4A_RECOVERY_WORKFLOW_HEAD_SHA"; do
            git cat-file -e "$sha^{commit}"
          done
          git merge-base --is-ancestor "$C4A_BASE_SHA" "$C4A_SOURCE_SHA"
          git merge-base --is-ancestor "$C4A_SOURCE_SHA" "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA"
          git merge-base --is-ancestor "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA" "$C4A_RECOVERY_WORKFLOW_HEAD_SHA"
          test "$(git rev-list --count "$C4A_SOURCE_SHA..$C4A_ECONOMIC_WORKFLOW_HEAD_SHA")" = "4"
          test "$(git rev-list --count "$C4A_ECONOMIC_WORKFLOW_HEAD_SHA..$C4A_RECOVERY_WORKFLOW_HEAD_SHA")" = "1"
          test "$(git rev-list --count "$C4A_SOURCE_SHA..$C4A_RECOVERY_WORKFLOW_HEAD_SHA")" = "5"
          mapfile -t changed < <(git diff --name-only "$C4A_SOURCE_SHA" "$C4A_RECOVERY_WORKFLOW_HEAD_SHA")
          test "${#changed[@]}" = "1"
          test "${changed[0]}" = ".github/workflows/c4a-authoritative-screen.yml"
          python - <<'PY'
          import json
          import os
          import pathlib
          import subprocess

          def git(*args: str) -> str:
              return subprocess.check_output(["git", *args], text=True).strip()

          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "PASS",
              "recovery_mode": "EVIDENCE_ONLY_NO_ECONOMIC_RERUN",
              "pull_request": 50,
              "event": os.environ["GITHUB_EVENT_NAME"],
              "source_head_sha": os.environ["C4A_SOURCE_SHA"],
              "economic_workflow_head_sha": os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"],
              "economic_merge_ref_sha": os.environ["C4A_ECONOMIC_MERGE_REF_SHA"],
              "recovery_workflow_head_sha": os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              "recovery_merge_ref_sha": os.environ["C4A_RECOVERY_MERGE_REF_SHA"],
              "checked_out_sha": git("rev-parse", "HEAD"),
              "source_to_economic_commit_count": 4,
              "economic_to_recovery_commit_count": 1,
              "source_to_recovery_commit_count": 5,
              "source_to_recovery_changed_files": git(
                  "diff",
                  "--name-only",
                  os.environ["C4A_SOURCE_SHA"],
                  os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              ).splitlines(),
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          path = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"]) / "recovery_binding.json"
          path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          PY

      - name: Verify failed run and immutable economic artifact metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' verify-economic-artifact > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def fetch(url: str):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          run = fetch(
              f"https://api.github.com/repos/{repo}/actions/runs/{os.environ['C4A_ECONOMIC_RUN_ID']}"
          )
          artifact = fetch(
              f"https://api.github.com/repos/{repo}/actions/artifacts/{os.environ['C4A_ECONOMIC_ARTIFACT_ID']}"
          )
          assert run["name"] == "C4A Authoritative Screen"
          assert run["event"] == "pull_request"
          assert run["status"] == "completed"
          assert run["conclusion"] == "failure"
          assert run["head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert artifact["name"] == os.environ["C4A_ECONOMIC_ARTIFACT_NAME"]
          assert str(artifact["id"]) == os.environ["C4A_ECONOMIC_ARTIFACT_ID"]
          assert artifact["expired"] is False
          assert artifact["digest"] == os.environ["C4A_ECONOMIC_ARTIFACT_DIGEST"]
          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "PASS",
              "run_id": run["id"],
              "run_number": run["run_number"],
              "run_conclusion": run["conclusion"],
              "economic_workflow_head_sha": run["head_sha"],
              "artifact_id": artifact["id"],
              "artifact_name": artifact["name"],
              "artifact_digest": artifact["digest"],
              "artifact_size_in_bytes": artifact["size_in_bytes"],
              "classification": "POST_ECONOMIC_FINALIZATION_INFRASTRUCTURE_FAILURE",
              "observed_economic_payload": "REJECTED_UNVERIFIED_AT_THIS_STEP",
              "selected_policy": None,
              "cause": "primitive economic evidence completed, but direct script execution broke namespace-package relative imports before independent finalization",
              "recovery_action": "download the immutable artifact and run only independent finalization with python -m; do not redownload candles or rerun the economic screen",
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          path = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"]) / "economic_artifact_binding.json"
          path.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          PY

      - name: Checkout frozen economic source
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' checkout-source > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          git checkout --detach "$C4A_SOURCE_SHA"
          test "$(git rev-parse HEAD)" = "$C4A_SOURCE_SHA"
          test ! -e .github/workflows/c4a-authoritative-screen.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: implementation/pyproject.toml

      - name: Install frozen independent-finalization dependencies
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' install-finalizer > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Download immutable completed economic artifact
        uses: actions/download-artifact@v4
        with:
          name: c4a-authoritative-evidence-29746643601
          path: recovered_c4a_artifact
          github-token: ${{ github.token }}
          repository: Dreaminmaster/ai-autonomous-trading-os
          run-id: 29746643601

      - name: Restore and verify primitive economic evidence without rerunning it
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' restore-primitive-evidence > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/decision.json
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/run_summary.json
          test -f recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum/input_candles/BTC_USDT_4h.json
          rm -rf "$C4A_RESULTS" "$C4A_PROVENANCE"
          mkdir -p "$(dirname "$C4A_RESULTS")" "$(dirname "$C4A_PROVENANCE")"
          cp -a \
            recovered_c4a_artifact/backtest_results/c4a_large_liquid_cross_sectional_momentum \
            "$C4A_RESULTS"
          cp -a recovered_c4a_artifact/c4a_workflow_provenance "$C4A_PROVENANCE"
          mkdir -p "$C4A_RESULTS/workflow_provenance"
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_RESULTS/workflow_provenance/"
          cp -a "$C4A_RECOVERY_PROVENANCE"/. "$C4A_PROVENANCE/"
          python - <<'PY'
          import json
          import os
          import pathlib

          root = pathlib.Path(os.environ["C4A_RESULTS"])
          summary = json.loads((root / "run_summary.json").read_text(encoding="utf-8"))
          decision = json.loads((root / "decision.json").read_text(encoding="utf-8"))
          failure = json.loads(
              (root / "workflow_provenance" / "workflow_failure.json").read_text(encoding="utf-8")
          )
          exact = json.loads(
              (root / "workflow_provenance" / "exact_binding.json").read_text(encoding="utf-8")
          )
          assert summary["status"] == "PASS" and summary["errors"] == []
          assert summary["economic_result"] == "REJECTED"
          assert summary["selected_policy"] is None
          assert decision["economic_result"] == "REJECTED"
          assert decision["selected_policy"] is None
          assert summary["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert summary["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert exact["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert exact["workflow_head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert exact["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert failure["status"] == "EVIDENCE_FAILURE"
          assert failure["failed_phase"] == "independent-finalization"
          assert failure["economic_result"] is None
          assert failure["selected_policy"] is None
          assert summary["policy_row_count"] == 27
          assert summary["comparator_row_count"] == 36
          assert summary["result_pointer_count"] == 63
          assert summary["result_export_count"] == 63
          assert summary["weekly_schedule_count"] == 120
          assert summary["weekly_signal_row_count"] == 960
          assert summary["dsr_observations_per_policy"] == 39
          candles = sorted((root / "input_candles").glob("*_4h.json"))
          assert len(candles) == 12
          assert all(len(json.loads(path.read_text(encoding="utf-8"))) == 2376 for path in candles)
          for payload in (summary, decision, exact, failure):
              assert payload.get("holdout_state") == "HOLDOUT_CLOSED"
              assert payload.get("live") == "FORBIDDEN"
              assert payload.get("confirmation_opened", False) is False
          print("primitive C4A artifact verified; economic screen will not be rerun")
          PY

      - name: Run ordered independent finalization as a package module
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' independent-finalization-recovery > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          cd implementation
          set -o pipefail
          python -m scripts.run_c4a_finalization \
            2>&1 | tee freqtrade_data/c4a_workflow_provenance/c4a_recovery_finalization.log

      - name: Independently verify recovered final artifact
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' recovered-pre-upload-verification > "$C4A_RECOVERY_PROVENANCE/current_phase.txt"
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib

          root = pathlib.Path(os.environ["C4A_RESULTS"])

          def load(name: str):
              return json.loads((root / name).read_text(encoding="utf-8"))

          summary = load("run_summary.json")
          decision = load("decision.json")
          final = load("final_evidence.json")
          inventory = load("source_inventory.json")
          snapshots = load("source_snapshot_index.json")
          manifest = load("manifest.json")
          preverify = load("pre_manifest_verification.json")
          economic_binding = load("workflow_provenance/exact_binding.json")
          recovery_binding = load("workflow_provenance/recovery_binding.json")
          artifact_binding = load("workflow_provenance/economic_artifact_binding.json")

          assert summary["status"] == "PASS" and summary["errors"] == []
          assert final["status"] == "PASS" and final["errors"] == []
          assert decision["economic_result"] == "REJECTED"
          assert decision["selected_policy"] is None
          assert summary["economic_result"] == "REJECTED"
          assert summary["selected_policy"] is None
          assert summary["source_head_sha"] == os.environ["C4A_SOURCE_SHA"]
          assert summary["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert inventory["status"] == "PASS" and inventory["file_count"] == 28
          assert snapshots["status"] == "PASS" and snapshots["snapshot_count"] == 28
          assert preverify["status"] == "PASS"
          assert len(load("candidate_universe.json")) == 12
          assert len(load("selected_universe.json")) == 8
          assert economic_binding["workflow_head_sha"] == os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"]
          assert economic_binding["merge_ref_sha"] == os.environ["C4A_ECONOMIC_MERGE_REF_SHA"]
          assert recovery_binding["recovery_mode"] == "EVIDENCE_ONLY_NO_ECONOMIC_RERUN"
          assert recovery_binding["recovery_workflow_head_sha"] == os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"]
          assert recovery_binding["recovery_merge_ref_sha"] == os.environ["C4A_RECOVERY_MERGE_REF_SHA"]
          assert artifact_binding["artifact_id"] == int(os.environ["C4A_ECONOMIC_ARTIFACT_ID"])
          assert artifact_binding["artifact_digest"] == os.environ["C4A_ECONOMIC_ARTIFACT_DIGEST"]

          pointers = sorted(root.rglob(".last_result.json"))
          exports = sorted(root.rglob("result.json"))
          assert len(pointers) == 63 and len(exports) == 63
          referenced = set()
          for pointer in pointers:
              payload = json.loads(pointer.read_text(encoding="utf-8"))
              result = pointer.parent / payload["latest"]
              assert result.is_file()
              assert hashlib.sha256(result.read_bytes()).hexdigest() == payload["sha256"]
              referenced.add(result.resolve())
          assert referenced == {path.resolve() for path in exports}

          listed = {item["path"]: item for item in manifest["files"]}
          actual = {
              str(path.relative_to(root)): path
              for path in root.rglob("*")
              if path.is_file() and path.name != "manifest.json"
          }
          assert set(listed) == set(actual)
          assert manifest["file_count"] == len(listed)
          for relative, path in actual.items():
              assert listed[relative]["size"] == path.stat().st_size
              assert listed[relative]["sha256"] == hashlib.sha256(path.read_bytes()).hexdigest()

          for payload in (
              summary,
              decision,
              final,
              inventory,
              snapshots,
              manifest,
              preverify,
              recovery_binding,
              artifact_binding,
          ):
              assert payload.get("holdout_state") == "HOLDOUT_CLOSED"
              assert payload.get("live") == "FORBIDDEN"
              assert payload.get("confirmation_opened", False) is False

          print(
              "C4A recovered final artifact PASS:",
              decision["economic_result"],
              decision["selected_policy"],
              manifest["file_count"],
          )
          PY

      - name: Record evidence-recovery failure without changing the economic payload
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          phase="UNKNOWN"
          if [ -f "$C4A_RECOVERY_PROVENANCE/current_phase.txt" ]; then
            phase="$(cat "$C4A_RECOVERY_PROVENANCE/current_phase.txt")"
          fi
          mkdir -p "$C4A_RECOVERY_PROVENANCE" "$C4A_RESULTS/workflow_provenance"
          PHASE="$phase" python - <<'PY'
          import json
          import os
          import pathlib

          payload = {
              "schema_version": 1,
              "stage": "C4A",
              "status": "EVIDENCE_RECOVERY_FAILURE",
              "failed_phase": os.environ.get("PHASE", "UNKNOWN"),
              "source_head_sha": os.environ["C4A_SOURCE_SHA"],
              "economic_workflow_head_sha": os.environ["C4A_ECONOMIC_WORKFLOW_HEAD_SHA"],
              "economic_merge_ref_sha": os.environ["C4A_ECONOMIC_MERGE_REF_SHA"],
              "recovery_workflow_head_sha": os.environ["C4A_RECOVERY_WORKFLOW_HEAD_SHA"],
              "recovery_merge_ref_sha": os.environ["C4A_RECOVERY_MERGE_REF_SHA"],
              "economic_screen_rerun": False,
              "authoritative_result_claimed": False,
              "selected_policy": None,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          recovery = pathlib.Path(os.environ["C4A_RECOVERY_PROVENANCE"])
          recovery.mkdir(parents=True, exist_ok=True)
          (recovery / "recovery_failure.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          result_provenance = pathlib.Path(os.environ["C4A_RESULTS"]) / "workflow_provenance"
          result_provenance.mkdir(parents=True, exist_ok=True)
          for source in recovery.iterdir():
              if source.is_file():
                  (result_provenance / source.name).write_bytes(source.read_bytes())
          PY

      - name: Upload recovered C4A final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c4a-recovered-final-evidence-${{ github.run_id }}
          path: |
            implementation/freqtrade_data/backtest_results/c4a_large_liquid_cross_sectional_momentum
            implementation/freqtrade_data/c4a_workflow_provenance
            implementation/freqtrade_data/c4a_recovery_provenance
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
