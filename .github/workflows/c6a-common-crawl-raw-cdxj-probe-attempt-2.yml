name: C6A Common Crawl Raw CDXJ Probe Attempt 2

# One new bounded execution against the remediated implementation. This is not
# a rerun of attempt 1. It is triggered only by the main-branch commit that
# first adds this exact file. Any UI rerun is rejected before checkout/network.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/c6a-common-crawl-raw-cdxj-probe-attempt-2.yml

permissions:
  contents: read

concurrency:
  group: c6a-common-crawl-raw-cdxj-probe-attempt-2
  cancel-in-progress: false

jobs:
  probe:
    name: exact bounded remediated raw Common Crawl CDXJ probe
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      C6A_PROBE_ATTEMPT: "2"
      C6A_PROBE_IMPLEMENTATION_SHA: a673e95145e2ade2589abaf1bb5a559a2f8b7461
      C6A_VALIDATED_PR_MERGE_REF: refs/pull/86/merge@4e3403e1dfd112208a36b3ff3cdadb1f75c9b566
      C6A_FROZEN_INVENTORY_SHA256: d68ba30bf038d9b9d497edcd26c550ac6c749864a2ca76c0e13981fabb0a897a
      C6A_BUNDLE_DIR: ${{ github.workspace }}/c6a-common-crawl-raw-cdxj-probe-attempt-2-bundle
      C6A_PROBE_DIR: ${{ github.workspace }}/c6a-common-crawl-raw-cdxj-probe-attempt-2-bundle/probe

    steps:
      - name: Reject any rerun before checkout or network access
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_RUN_ATTEMPT" = "1"

      - name: Checkout exact reviewed remediated implementation
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: a673e95145e2ade2589abaf1bb5a559a2f8b7461
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify immutable execution identity
        shell: bash
        run: |
          set -euo pipefail
          observed="$(git rev-parse HEAD)"
          test "$observed" = "$C6A_PROBE_IMPLEMENTATION_SHA"
          test -z "$(git status --porcelain)"
          mkdir -p "$C6A_BUNDLE_DIR/workflow"
          {
            printf 'attempt=%s\n' "$C6A_PROBE_ATTEMPT"
            printf 'implementation_sha=%s\n' "$observed"
            printf 'validated_pr_merge_ref=%s\n' "$C6A_VALIDATED_PR_MERGE_REF"
            printf 'frozen_inventory_sha256=%s\n' "$C6A_FROZEN_INVENTORY_SHA256"
            printf 'trigger_commit=%s\n' "$GITHUB_SHA"
            printf 'workflow_ref=%s\n' "$GITHUB_WORKFLOW_REF"
            printf 'run_id=%s\n' "$GITHUB_RUN_ID"
            printf 'run_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$C6A_BUNDLE_DIR/workflow/execution-identity.txt"

      - name: Run bounded remediated raw CDXJ probe
        id: probe
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cd implementation
          env -u HTTP_PROXY -u HTTPS_PROXY -u ALL_PROXY \
              -u http_proxy -u https_proxy -u all_proxy \
              -u COOKIE -u COOKIES -u AUTHORIZATION \
              -u PROXY_AUTHORIZATION -u cookie -u cookies \
              -u authorization -u proxy_authorization \
              PYTHONPATH=src python \
                scripts/run_c6a_common_crawl_raw_cdxj_probe.py \
                --output "$C6A_PROBE_DIR" \
                2>&1 | tee "$C6A_BUNDLE_DIR/workflow/probe.log"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build complete outer bundle manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_BUNDLE_DIR"])
          root.mkdir(parents=True, exist_ok=True)
          files = []
          for path in sorted(item for item in root.rglob("*") if item.is_file()):
              relative = path.relative_to(root).as_posix()
              if relative == "bundle-manifest.json":
                  continue
              data = path.read_bytes()
              files.append({
                  "path": relative,
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })
          payload = {
              "schema_version": 1,
              "stage": "C6A_COMMON_CRAWL_RAW_CDXJ_PROBE_ATTEMPT_2_BUNDLE",
              "probe_attempt": os.environ["C6A_PROBE_ATTEMPT"],
              "implementation_sha": os.environ["C6A_PROBE_IMPLEMENTATION_SHA"],
              "validated_pr_merge_ref": os.environ["C6A_VALIDATED_PR_MERGE_REF"],
              "frozen_inventory_sha256": os.environ["C6A_FROZEN_INVENTORY_SHA256"],
              "trigger_commit": os.environ["GITHUB_SHA"],
              "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "files": files,
              "file_count": len(files),
              "raw_cdxj_probe_authorized": True,
              "direct_okx_access_authorized": False,
              "warc_retrieval_authorized": False,
              "article_expansion_authorized": False,
              "third_full_capture_authorized": False,
              "implementation_authorized": False,
              "economic_data_access_authorized": False,
              "paper_state": "PAPER_CLOSED",
              "shadow_state": "SHADOW_CLOSED",
              "live_state": "LIVE_FORBIDDEN",
          }
          encoded = (
              json.dumps(payload, sort_keys=True, separators=(",", ":"))
              + "\n"
          ).encode()
          (root / "bundle-manifest.json").write_bytes(encoded)
          PY

      - name: Upload complete attempt-2 probe bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c6a-common-crawl-raw-cdxj-probe-attempt-2-${{ github.run_id }}
          path: ${{ env.C6A_BUNDLE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 6

      - name: Publish non-authorizing probe summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["C6A_PROBE_DIR"])
          result_path = root / "probe_result.json"
          review_path = root / "independent_review.json"
          lines = [
              "## C6A remediated raw CDXJ probe attempt 2",
              "",
              f"- implementation SHA: `{os.environ['C6A_PROBE_IMPLEMENTATION_SHA']}`",
              f"- validated PR merge ref: `{os.environ['C6A_VALIDATED_PR_MERGE_REF']}`",
              f"- frozen inventory SHA-256: `{os.environ['C6A_FROZEN_INVENTORY_SHA256']}`",
              "- raw CDXJ probe authorized: `true` for this new invocation only",
              "- attempt-1 rerun: `false`",
              "- direct OKX access authorized: `false`",
              "- WARC retrieval authorized: `false`",
              "- third full capture authorized: `false`",
              "- economic data access authorized: `false`",
              "- live state: `LIVE_FORBIDDEN`",
          ]
          if result_path.is_file():
              result = json.loads(result_path.read_text(encoding="utf-8"))
              lines.extend([
                  f"- probe status: `{result.get('status')}`",
                  f"- probe result: `{result.get('result')}`",
                  f"- cluster field semantics: `{result.get('cluster_fifth_field_semantics')}`",
                  f"- maximum CDXJ lines per block: `{result.get('max_cdxj_lines_per_block')}`",
                  f"- completed queries: `{result.get('completed_query_count')}`",
                  f"- failed queries: `{result.get('failed_query_count')}`",
                  f"- hit queries: `{result.get('hit_query_count')}`",
                  f"- hit query IDs: `{result.get('hit_query_ids')}`",
                  f"- execution errors: `{result.get('errors')}`",
              ])
          else:
              lines.append("- probe result: `ARTIFACT_MISSING_OR_RUNTIME_FAILURE`")
          if review_path.is_file():
              review = json.loads(review_path.read_text(encoding="utf-8"))
              lines.extend([
                  f"- independent review: `{review.get('status')}`",
                  f"- independent probe status: `{review.get('probe_status_recomputed')}`",
                  f"- independent probe result: `{review.get('probe_result_recomputed')}`",
                  f"- review errors: `{review.get('errors')}`",
              ])
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Enforce reviewed result and bundle integrity after upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status='${{ steps.probe.outputs.exit_code }}'
          test "$status" = "0" -o "$status" = "3"
          test -f "$C6A_PROBE_DIR/probe_result.json"
          test -f "$C6A_PROBE_DIR/independent_review.json"
          test -f "$C6A_PROBE_DIR/range_evidence.json"
          test -f "$C6A_PROBE_DIR/inventory_snapshot.json"
          test -f "$C6A_PROBE_DIR/manifest.json"
          test -f "$C6A_BUNDLE_DIR/bundle-manifest.json"
          PROBE_EXIT_CODE="$status" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.parse import urlsplit

          bundle = Path(os.environ["C6A_BUNDLE_DIR"])
          probe = Path(os.environ["C6A_PROBE_DIR"])
          expected_inventory = os.environ["C6A_FROZEN_INVENTORY_SHA256"]
          exit_code = os.environ["PROBE_EXIT_CODE"]

          def load(path):
              return json.loads(path.read_text(encoding="utf-8"))

          outer = load(bundle / "bundle-manifest.json")
          observed = {row["path"]: row for row in outer["files"]}
          expected = {
              path.relative_to(bundle).as_posix(): path
              for path in bundle.rglob("*")
              if path.is_file() and path.name != "bundle-manifest.json"
          }
          if set(observed) != set(expected) or outer.get("file_count") != len(expected):
              raise SystemExit("outer bundle manifest coverage mismatch")
          for relative, path in expected.items():
              data = path.read_bytes()
              row = observed[relative]
              if row.get("size") != len(data) or row.get("sha256") != hashlib.sha256(data).hexdigest():
                  raise SystemExit(f"outer bundle manifest mismatch: {relative}")

          inner = load(probe / "manifest.json")
          inner_observed = {row["path"]: row for row in inner["files"]}
          inner_expected = {
              path.relative_to(probe).as_posix(): path
              for path in probe.rglob("*")
              if path.is_file() and path.name != "manifest.json"
          }
          if set(inner_observed) != set(inner_expected) or inner.get("file_count") != len(inner_expected):
              raise SystemExit("inner manifest coverage mismatch")
          for relative, path in inner_expected.items():
              data = path.read_bytes()
              row = inner_observed[relative]
              if row.get("size") != len(data) or row.get("sha256") != hashlib.sha256(data).hexdigest():
                  raise SystemExit(f"inner manifest mismatch: {relative}")
              if relative.lower().endswith((".warc", ".warc.gz")):
                  raise SystemExit("WARC bytes were retained without authorization")

          inventory_bytes = (probe / "inventory_snapshot.json").read_bytes()
          if hashlib.sha256(inventory_bytes).hexdigest() != expected_inventory:
              raise SystemExit("frozen inventory snapshot mismatch")

          result = load(probe / "probe_result.json")
          review = load(probe / "independent_review.json")
          evidence = load(probe / "range_evidence.json")
          if review.get("status") != "PASS" or review.get("errors") != []:
              raise SystemExit("independent review did not pass cleanly")
          if review.get("frozen_inventory_sha256") != expected_inventory:
              raise SystemExit("review frozen inventory identity mismatch")
          if result.get("inventory_sha256") != expected_inventory:
              raise SystemExit("producer frozen inventory identity mismatch")
          if result.get("status") != review.get("probe_status_recomputed"):
              raise SystemExit("producer/reviewer status mismatch")
          if result.get("result") != review.get("probe_result_recomputed"):
              raise SystemExit("producer/reviewer result mismatch")
          for payload_name, payload in (("result", result), ("review", review)):
              if payload.get("cluster_fifth_field_semantics") != "OPAQUE_BLOCK_ORDINAL":
                  raise SystemExit(f"{payload_name} cluster semantics mismatch")
              if payload.get("max_cdxj_lines_per_block") != 3000:
                  raise SystemExit(f"{payload_name} CDXJ line bound mismatch")

          allowed = {
              ("PASS", "RAW_CDXJ_ACCESS_PATH_VERIFIED", "0"),
              ("FAIL", "RAW_CDXJ_ACCESS_PATH_EXECUTION_FAILED", "3"),
          }
          state = (result.get("status"), result.get("result"), exit_code)
          if state not in allowed:
              raise SystemExit(f"unexpected raw CDXJ result state: {state}")
          if result.get("target_count") != 7 or result.get("expected_query_count") != 23:
              raise SystemExit("frozen query inventory count drift")
          completed = result.get("completed_query_count")
          failed = result.get("failed_query_count")
          queries = result.get("queries")
          errors = result.get("errors")
          if not isinstance(completed, int) or not isinstance(failed, int):
              raise SystemExit("query counts are not integers")
          if not isinstance(queries, list) or not isinstance(errors, list):
              raise SystemExit("query/error rows missing")
          if completed != len(queries) or failed != len(errors) or completed + failed != 23:
              raise SystemExit("completed/failed query partition mismatch")
          completed_ids = [row.get("query_id") for row in queries]
          failed_ids = [row.get("query_id") for row in errors]
          if len(set(completed_ids)) != len(completed_ids) or len(set(failed_ids)) != len(failed_ids):
              raise SystemExit("duplicate completed or failed query ID")
          if set(completed_ids) & set(failed_ids):
              raise SystemExit("query appears in completed and failed sets")
          if result.get("status") == "PASS" and (completed != 23 or failed != 0):
              raise SystemExit("PASS does not cover all 23 queries")
          if result.get("status") == "FAIL" and failed < 1:
              raise SystemExit("FAIL lacks an execution failure")
          hits = result.get("hit_query_ids")
          if not isinstance(hits, list) or result.get("hit_query_count") != len(hits):
              raise SystemExit("hit inventory mismatch")
          if not set(hits).issubset(set(completed_ids)):
              raise SystemExit("hit query was not completed")

          for query in queries:
              blocks = query.get("selected_blocks")
              if not isinstance(blocks, list) or not blocks or len(blocks) > 4:
                  raise SystemExit("selected block inventory invalid")
              for block in blocks:
                  ordinal = block.get("block_ordinal")
                  line_count = block.get("line_count")
                  if not isinstance(ordinal, int) or ordinal <= 0:
                      raise SystemExit("block ordinal invalid")
                  if "record_count" in block:
                      raise SystemExit("deprecated record-count semantics retained")
                  if not isinstance(line_count, int) or not 1 <= line_count <= 3000:
                      raise SystemExit("observed block line count invalid")

          requests = evidence.get("requests")
          if not isinstance(requests, list) or evidence.get("request_count") != len(requests):
              raise SystemExit("range evidence count mismatch")
          for row in requests:
              parsed = urlsplit(str(row.get("url", "")))
              if parsed.scheme != "https" or parsed.hostname != "data.commoncrawl.org":
                  raise SystemExit("range request escaped Common Crawl data host")
              path = parsed.path
              if not (
                  path.endswith("/indexes/cluster.idx")
                  or "/indexes/cdx-" in path and path.endswith(".gz")
              ):
                  raise SystemExit("range request escaped frozen index object families")
              start = row.get("start")
              end = row.get("end")
              total = row.get("total_size")
              if not all(isinstance(value, int) for value in (start, end, total)):
                  raise SystemExit("range coordinates are not integers")
              if start < 0 or end < start or total <= end:
                  raise SystemExit("range coordinates invalid")
              if row.get("status") != 206 or row.get("content_range") != f"bytes {start}-{end}/{total}":
                  raise SystemExit("range protocol mismatch")

          for payload_name, payload in (
              ("result", result),
              ("review", review),
              ("inner", inner),
          ):
              for key in (
                  "direct_okx_access_authorized",
                  "warc_retrieval_authorized",
                  "article_expansion_authorized",
                  "third_full_capture_authorized",
                  "implementation_authorized",
                  "economic_data_access_authorized",
              ):
                  if payload.get(key) is not False:
                      raise SystemExit(f"{payload_name} improperly authorizes {key}")
              if payload.get("paper_state") != "PAPER_CLOSED":
                  raise SystemExit(f"{payload_name} paper-state drift")
              if payload.get("shadow_state") != "SHADOW_CLOSED":
                  raise SystemExit(f"{payload_name} shadow-state drift")
              if payload.get("live_state") != "LIVE_FORBIDDEN":
                  raise SystemExit(f"{payload_name} live-state drift")

          if outer.get("raw_cdxj_probe_authorized") is not True:
              raise SystemExit("outer one-shot authorization identity missing")
          if outer.get("probe_attempt") != "2":
              raise SystemExit("outer probe-attempt identity mismatch")
          for key in (
              "direct_okx_access_authorized",
              "warc_retrieval_authorized",
              "article_expansion_authorized",
              "third_full_capture_authorized",
              "implementation_authorized",
              "economic_data_access_authorized",
          ):
              if outer.get(key) is not False:
                  raise SystemExit(f"outer bundle improperly authorizes {key}")
          if outer.get("paper_state") != "PAPER_CLOSED" or outer.get("shadow_state") != "SHADOW_CLOSED" or outer.get("live_state") != "LIVE_FORBIDDEN":
              raise SystemExit("outer safety-state drift")
          if outer.get("implementation_sha") != os.environ["C6A_PROBE_IMPLEMENTATION_SHA"]:
              raise SystemExit("outer implementation SHA mismatch")
          if outer.get("validated_pr_merge_ref") != os.environ["C6A_VALIDATED_PR_MERGE_REF"]:
              raise SystemExit("outer merge-ref mismatch")
          if outer.get("frozen_inventory_sha256") != expected_inventory:
              raise SystemExit("outer frozen inventory mismatch")
          if outer.get("run_id") != os.environ["GITHUB_RUN_ID"] or outer.get("run_attempt") != "1":
              raise SystemExit("outer run identity mismatch")
          PY
