name: B4.3B3 One-Time File Writer

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_one_time_writer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  write-files:
    if: github.head_ref == 'feat/b4.3b3-lifecycle-performance-gate' || github.ref_name == 'feat/b4.3b3-lifecycle-performance-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/b4.3b3-lifecycle-performance-gate
          fetch-depth: 1
      - name: Decode exact reviewed files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p implementation/scripts implementation/tests
          printf '%s' '' | base64 -d | gzip -d > implementation/scripts/benchmark_b4_3b_lifecycle.py
          printf '%s' '' | base64 -d | gzip -d > implementation/tests/test_b4_3b_performance_contract.py
          test "$(sha256sum implementation/scripts/benchmark_b4_3b_lifecycle.py | awk '{print $1}')" = '76c189f8a835141171d368321b4f85ee1c8b5ee52ec95a9a94aa360d18541eb3'
          test "$(sha256sum implementation/tests/test_b4_3b_performance_contract.py | awk '{print $1}')" = '8877cae226350bcb7c8a2df31105d1a48b3166302dcdf28fe3fff5ca7857e64c'
          python -m py_compile implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py
      - name: Commit only when changed
        shell: bash
        run: |
          set -euo pipefail
          git add implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py
          if git diff --cached --quiet; then
            echo 'Reviewed files already present.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'feat(b4.3b3): add lifecycle performance evidence gate'
          git push origin HEAD:feat/b4.3b3-lifecycle-performance-gate
