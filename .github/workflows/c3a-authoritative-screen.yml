name: C3A Authoritative Screen

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: read
  actions: read

concurrency:
  group: c3a-authoritative-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  C3A_SOURCE_SHA: 3cdf1e989d6084c7f66f33d6b1a8d297d3f76965
  C3A_MERGE_REF_SHA: ${{ github.sha }}
  C3A_WORKFLOW_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
  C3A_BASE_SHA: ${{ github.event.pull_request.base.sha }}
  C3A_CI_RUN_ID: '29672938761'
  C3A_VALIDATION_RUN_ID: '29672938732'
  C3A_FAILURE1_RUN_ID: '29675135871'
  C3A_FAILURE1_HEAD_SHA: 878904bfe7dd934542a0684f69234f4043513bf0
  C3A_FAILURE1_ARTIFACT_DIGEST: sha256:363fa1934ac2ad429ae9dbf069406de7d5a07ca49580977c290537cd8129f6b5
  C3A_FAILURE2_RUN_ID: '29683819964'
  C3A_FAILURE2_HEAD_SHA: 268436dac26f1d9ddd4079185cf5fb157f0750e8
  C3A_FAILURE2_ARTIFACT_DIGEST: sha256:7defbcfad37d2f596a49e34e598cad387e2d833cd9888bb250af218722f6cba6
  C3A_RESULT_DIR: ${{ github.workspace }}/implementation/freqtrade_data/backtest_results/c3a_residual_mean_reversion
  C3A_RUNTIME_DIR: ${{ github.workspace }}/implementation/freqtrade_data/c3a_authoritative_runtime
  C3A_PUBLIC_CONFIG: ${{ github.workspace }}/implementation/freqtrade_data/config.c3a-public.json

jobs:
  authoritative-screen:
    if: >-
      github.event.pull_request.number == 46 &&
      github.event.pull_request.head.ref == 'feat/c3a-residual-mean-reversion'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact PR merge ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize always-uploaded evidence area
        run: |
          set -euo pipefail
          mkdir -p "$C3A_RUNTIME_DIR" "$C3A_RESULT_DIR"
          cat > "$C3A_RUNTIME_DIR/workflow_state.json" <<JSON
          {
            "schema_version": 1,
            "stage": "C3A",
            "status": "RUNNING_CONTROLLED_RECOVERY_2",
            "event": "${GITHUB_EVENT_NAME}",
            "event_action": "${{ github.event.action }}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "source_head_sha": "${C3A_SOURCE_SHA}",
            "workflow_head_sha": "${C3A_WORKFLOW_HEAD_SHA}",
            "merge_ref_sha": "${C3A_MERGE_REF_SHA}",
            "base_sha": "${C3A_BASE_SHA}",
            "confirmation_opened": false,
            "holdout_state": "HOLDOUT_CLOSED",
            "live": "FORBIDDEN"
          }
          JSON

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: implementation/pyproject.toml

      - name: Install frozen research dependencies
        run: |
          set -euo pipefail
          cd implementation
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,freqtrade]'
          python - <<'PY'
          import importlib.metadata as md
          for name in ("numpy", "pandas", "scipy", "freqtrade"):
              print(name, md.version(name))
          PY

      - name: Bind frozen source and prove recovery chain is pre-economic
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$GITHUB_EVENT_NAME" = "pull_request"
          test "${{ github.event.action }}" = "ready_for_review"
          test "${{ github.event.pull_request.number }}" = "46"
          test "$(git rev-parse HEAD)" = "$C3A_MERGE_REF_SHA"
          git cat-file -e "${C3A_SOURCE_SHA}^{commit}"
          git cat-file -e "${C3A_WORKFLOW_HEAD_SHA}^{commit}"
          git merge-base --is-ancestor "$C3A_SOURCE_SHA" "$C3A_WORKFLOW_HEAD_SHA"

          read -r merge_base_parent merge_head_parent extra_parent < <(git show -s --format='%P' "$C3A_MERGE_REF_SHA")
          test -z "${extra_parent:-}"
          test "$merge_base_parent" = "$C3A_BASE_SHA"
          test "$merge_head_parent" = "$C3A_WORKFLOW_HEAD_SHA"

          mapfile -t changed_paths < <(git diff --name-only "$C3A_SOURCE_SHA" "$C3A_WORKFLOW_HEAD_SHA")
          printf '%s\n' "${changed_paths[@]}" | tee "$C3A_RUNTIME_DIR/workflow_only_delta.txt"
          test "${#changed_paths[@]}" -eq 1
          test "${changed_paths[0]}" = ".github/workflows/c3a-authoritative-screen.yml"
          git diff --quiet "$C3A_SOURCE_SHA" "$C3A_WORKFLOW_HEAD_SHA" -- implementation docs/architecture/phase-c/c3a-residual-mean-reversion

          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          runtime = Path(os.environ["C3A_RUNTIME_DIR"])
          api = os.environ["GITHUB_API_URL"].rstrip("/")
          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          source = os.environ["C3A_SOURCE_SHA"]

          def get(path):
              request = urllib.request.Request(
                  f"{api}/repos/{repository}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          validations = []
          for run_id, expected_name in {
              os.environ["C3A_CI_RUN_ID"]: "CI",
              os.environ["C3A_VALIDATION_RUN_ID"]: "Freqtrade Validation",
          }.items():
              run = get(f"/actions/runs/{run_id}")
              assert run["name"] == expected_name, run
              assert run["event"] == "pull_request", run
              assert run["head_sha"] == source, run
              assert run["status"] == "completed" and run["conclusion"] == "success", run
              validations.append({
                  "run_id": int(run_id),
                  "workflow_name": run["name"],
                  "head_sha": run["head_sha"],
                  "conclusion": run["conclusion"],
                  "html_url": run["html_url"],
              })

          specs = [
              {
                  "run_id": os.environ["C3A_FAILURE1_RUN_ID"],
                  "head_sha": os.environ["C3A_FAILURE1_HEAD_SHA"],
                  "artifact_digest": os.environ["C3A_FAILURE1_ARTIFACT_DIGEST"],
                  "required": {
                      "Prove frozen implementation and safety tests": "failure",
                      "Download only preregistered public OKX candles": "skipped",
                      "Seal boundary and prove exact full-range coverage": "skipped",
                      "Run the single authoritative C3A screen and independent finalizer": "skipped",
                  },
                  "failure_stage": "pre_economic_runtime_configuration",
                  "economic_information_observed": False,
              },
              {
                  "run_id": os.environ["C3A_FAILURE2_RUN_ID"],
                  "head_sha": os.environ["C3A_FAILURE2_HEAD_SHA"],
                  "artifact_digest": os.environ["C3A_FAILURE2_ARTIFACT_DIGEST"],
                  "required": {
                      "Prove frozen implementation and create public-only runtime config": "success",
                      "Download only preregistered public OKX candles": "failure",
                      "Seal boundary and prove exact full-range coverage": "skipped",
                      "Run the single authoritative C3A screen and independent finalizer": "skipped",
                  },
                  "failure_stage": "pre_economic_missing_freqtrade_userdir",
                  "economic_information_observed": False,
              },
          ]

          incidents = []
          for spec in specs:
              run_id = spec["run_id"]
              run = get(f"/actions/runs/{run_id}")
              assert run["name"] == "C3A Authoritative Screen", run
              assert run["event"] == "pull_request", run
              assert run["head_sha"] == spec["head_sha"], run
              assert run["status"] == "completed" and run["conclusion"] == "failure", run
              jobs = get(f"/actions/runs/{run_id}/jobs")["jobs"]
              assert len(jobs) == 1, jobs
              steps = {item["name"]: item for item in jobs[0]["steps"]}
              for name, conclusion in spec["required"].items():
                  assert steps[name]["conclusion"] == conclusion, (name, steps[name])
              assert steps["Upload final C3A evidence even on failure"]["conclusion"] == "success", steps
              artifacts = get(f"/actions/runs/{run_id}/artifacts")["artifacts"]
              matches = [a for a in artifacts if a["name"] == f"c3a-authoritative-evidence-{run_id}"]
              assert len(matches) == 1, artifacts
              artifact = matches[0]
              assert artifact.get("digest") == spec["artifact_digest"], artifact
              assert artifact.get("expired") is False, artifact
              incidents.append({
                  "run_id": int(run_id),
                  "head_sha": run["head_sha"],
                  "conclusion": run["conclusion"],
                  "failure_stage": spec["failure_stage"],
                  "economic_information_observed": spec["economic_information_observed"],
                  "artifact_name": artifact["name"],
                  "artifact_digest": artifact["digest"],
              })

          chain = {
              "schema_version": 1,
              "stage": "C3A",
              "status": "PRE_ECONOMIC_RECOVERY_ELIGIBLE",
              "source_head_sha": source,
              "incidents": incidents,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          (runtime / "recovery_chain.json").write_text(
              json.dumps(chain, indent=2, sort_keys=True), encoding="utf-8"
          )
          binding = {
              "schema_version": 1,
              "stage": "C3A",
              "status": "PASS",
              "source_head_sha": source,
              "workflow_head_sha": os.environ["C3A_WORKFLOW_HEAD_SHA"],
              "merge_ref_sha": os.environ["C3A_MERGE_REF_SHA"],
              "base_sha": os.environ["C3A_BASE_SHA"],
              "allowed_delta": [".github/workflows/c3a-authoritative-screen.yml"],
              "prior_validation_runs": validations,
              "recovery_chain": chain,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
          }
          (runtime / "exact_binding.json").write_text(
              json.dumps(binding, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY

      - name: Prove frozen implementation and create public-only runtime
        run: |
          set -euo pipefail
          cd implementation
          set -o pipefail
          python -m pytest -v --tb=long \
            tests/test_c3a_contract_guard.py \
            tests/test_c3a_residual_reversion.py \
            tests/test_c3a_data_guard.py \
            tests/test_c3a_evidence_contract.py \
            tests/test_c3a_reference_equivalence.py \
            2>&1 | tee "$C3A_RUNTIME_DIR/c3a_authoritative_pytest.log"
          bash scripts/validate_no_secrets.sh 2>&1 | tee "$C3A_RUNTIME_DIR/no_secret_scan.log"
          python scripts/c3a_contract_guard.py config

          mkdir -p freqtrade_data user_data
          cat > "$C3A_PUBLIC_CONFIG" <<'JSON'
          {
            "max_open_trades": 1,
            "stake_currency": "USDT",
            "stake_amount": "unlimited",
            "tradable_balance_ratio": 0.99,
            "fiat_display_currency": "USD",
            "dry_run": true,
            "timeframe": "4h",
            "stoploss": -0.10,
            "trading_mode": "spot",
            "margin_mode": "",
            "cancel_open_orders_on_exit": false,
            "unfilledtimeout": {"entry": 10, "exit": 10, "exit_timeout_count": 0, "unit": "minutes"},
            "entry_pricing": {
              "price_side": "other",
              "use_order_book": false,
              "price_last_balance": 0.0,
              "check_depth_of_market": {"enabled": false, "bids_to_ask_delta": 1}
            },
            "exit_pricing": {"price_side": "other", "use_order_book": false},
            "exchange": {
              "name": "okx",
              "key": "",
              "secret": "",
              "password": "",
              "ccxt_config": {"enableRateLimit": true},
              "ccxt_async_config": {},
              "pair_whitelist": ["BTC/USDT", "ETH/USDT", "SOL/USDT"],
              "pair_blacklist": []
            },
            "pairlists": [{"method": "StaticPairList"}],
            "bot_name": "c3a_public_data_only",
            "initial_state": "stopped",
            "force_entry_enable": false
          }
          JSON
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          config = json.loads(Path(os.environ["C3A_PUBLIC_CONFIG"]).read_text(encoding="utf-8"))
          exchange = config["exchange"]
          assert config["dry_run"] is True
          assert config["trading_mode"] == "spot" and config["margin_mode"] == ""
          assert config["entry_pricing"]["use_order_book"] is False
          assert config["exit_pricing"]["use_order_book"] is False
          assert not exchange["key"] and not exchange["secret"] and not exchange["password"]
          assert exchange["pair_whitelist"] == ["BTC/USDT", "ETH/USDT", "SOL/USDT"]
          assert Path("user_data").is_dir()
          print("Public-only runtime and required Freqtrade user_data directory PASS")
          PY

      - name: Download only preregistered public OKX candles
        timeout-minutes: 15
        run: |
          set -euo pipefail
          cd implementation
          rm -rf freqtrade_data/data/okx
          mkdir -p freqtrade_data/data/okx user_data
          set -o pipefail
          freqtrade download-data \
            --config "$C3A_PUBLIC_CONFIG" \
            --userdir user_data \
            --datadir freqtrade_data/data/okx \
            --exchange okx \
            --pairs BTC/USDT ETH/USDT SOL/USDT \
            --timeframes 4h \
            --timerange 20230901-20241001 \
            2>&1 | tee "$C3A_RUNTIME_DIR/download_public_okx_4h.log"

      - name: Seal boundary and prove exact full-range coverage
        run: |
          set -euo pipefail
          cd implementation
          python scripts/c3a_contract_guard.py precheck
          cp freqtrade_data/c3a_runtime/c3a_contract_guard.json "$C3A_RUNTIME_DIR/contract_guard_precheck.json"
          python scripts/c3a_data_guard.py sanitize
          python scripts/c3a_data_guard.py verify
          cp freqtrade_data/c3a_runtime/c3a_data_boundary.json "$C3A_RUNTIME_DIR/"
          cp freqtrade_data/c3a_runtime/c3a_data_coverage.json "$C3A_RUNTIME_DIR/"
          python scripts/c3a_contract_guard.py postcheck
          cp freqtrade_data/c3a_runtime/c3a_contract_guard.json "$C3A_RUNTIME_DIR/contract_guard_postcheck.json"

      - name: Run authoritative screen and independent finalizer
        run: |
          set -euo pipefail
          cd implementation
          python scripts/c3a_evidence.py

          mkdir -p "$C3A_RESULT_DIR/workflow_provenance"
          cp "$C3A_RUNTIME_DIR"/exact_binding.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/recovery_chain.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/workflow_only_delta.txt "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/contract_guard_precheck.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/contract_guard_postcheck.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/c3a_data_boundary.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/c3a_data_coverage.json "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/c3a_authoritative_pytest.log "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/no_secret_scan.log "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_RUNTIME_DIR"/download_public_okx_4h.log "$C3A_RESULT_DIR/workflow_provenance/"
          cp "$C3A_PUBLIC_CONFIG" "$C3A_RESULT_DIR/workflow_provenance/public_runtime_config.json"

          python scripts/c3a_source_inventory.py
          python - <<'PY'
          import hashlib
          import json
          import os
          import shutil
          from pathlib import Path
          root = Path.cwd().parent
          results = Path(os.environ["C3A_RESULT_DIR"])
          inventory = json.loads((results / "source_inventory.json").read_text())
          snapshot_root = results / "source_snapshots"
          copied = []
          for item in inventory["files"]:
              relative = Path(item["path"])
              source = root / relative
              destination = snapshot_root / relative
              destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, destination)
              assert hashlib.sha256(destination.read_bytes()).hexdigest() == item["sha256"]
              assert destination.stat().st_size == item["size"]
              copied.append(str(relative))
          (results / "source_snapshot_index.json").write_text(json.dumps({
              "schema_version": 1,
              "stage": "C3A",
              "status": "PASS",
              "source_head_sha": os.environ["C3A_SOURCE_SHA"],
              "file_count": len(copied),
              "files": copied,
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN"
          }, indent=2, sort_keys=True), encoding="utf-8")
          PY

          python scripts/finalize_c3a_evidence.py
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          results = Path(os.environ["C3A_RESULT_DIR"])
          source = os.environ["C3A_SOURCE_SHA"]
          merge_ref = os.environ["C3A_MERGE_REF_SHA"]
          summary = json.loads((results / "run_summary.json").read_text())
          decision = json.loads((results / "decision.json").read_text())
          final = json.loads((results / "final_evidence.json").read_text())
          inventory = json.loads((results / "source_inventory.json").read_text())
          snapshots = json.loads((results / "source_snapshot_index.json").read_text())
          assert summary["status"] == "PASS" and summary["errors"] == []
          assert summary["source_head_sha"] == source and summary["merge_ref_sha"] == merge_ref
          assert final["status"] == "PASS" and final["errors"] == []
          assert final["source_head_sha"] == source and final["merge_ref_sha"] == merge_ref
          assert decision["economic_result"] in {"SELECTED", "REJECTED"}
          assert decision["confirmation_opened"] is False
          assert decision["holdout_state"] == "HOLDOUT_CLOSED" and decision["live"] == "FORBIDDEN"
          assert summary["policy_row_count"] == 27 and summary["comparator_row_count"] == 36
          assert summary["result_pointer_count"] == 63 and summary["result_export_count"] == 63
          assert len(list(results.rglob(".last_result.json"))) == 63
          assert len(list(results.rglob("result.json"))) == 63
          assert snapshots["file_count"] == inventory["file_count"]
          assert snapshots["files"] == [item["path"] for item in inventory["files"]]
          (results / "pre_manifest_verification.json").write_text(json.dumps({
              "schema_version": 1,
              "stage": "C3A",
              "status": "PASS",
              "source_head_sha": source,
              "merge_ref_sha": merge_ref,
              "economic_result": decision["economic_result"],
              "selected_policy": decision["selected_policy"],
              "policy_rows": 27,
              "comparator_rows": 36,
              "hidden_pointers": 63,
              "result_exports": 63,
              "source_snapshots": inventory["file_count"],
              "finalizer_checks": final["checks_passed"],
              "recovery_run_ids": [int(os.environ["C3A_FAILURE1_RUN_ID"]), int(os.environ["C3A_FAILURE2_RUN_ID"])],
              "confirmation_opened": False,
              "holdout_state": "HOLDOUT_CLOSED",
              "live": "FORBIDDEN",
              "errors": []
          }, indent=2, sort_keys=True), encoding="utf-8")
          PY

          python scripts/complete_c3a_manifest.py
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path
          results = Path(os.environ["C3A_RESULT_DIR"])
          manifest = json.loads((results / "manifest.json").read_text())
          assert manifest["source_head_sha"] == os.environ["C3A_SOURCE_SHA"]
          assert manifest["merge_ref_sha"] == os.environ["C3A_MERGE_REF_SHA"]
          assert manifest["holdout_state"] == "HOLDOUT_CLOSED" and manifest["live"] == "FORBIDDEN"
          files = manifest["files"]
          assert manifest["file_count"] == len(files)
          indexed = {item["path"]: item for item in files}
          required = {
              "run_summary.json", "decision.json", "final_evidence.json",
              "source_inventory.json", "source_snapshot_index.json",
              "pre_manifest_verification.json", "workflow_provenance/exact_binding.json",
              "workflow_provenance/recovery_chain.json", "workflow_provenance/public_runtime_config.json"
          }
          assert required.issubset(indexed)
          for relative, item in indexed.items():
              path = results / relative
              assert path.is_file(), relative
              assert path.stat().st_size == item["size"], relative
              assert hashlib.sha256(path.read_bytes()).hexdigest() == item["sha256"], relative
          decision = json.loads((results / "decision.json").read_text())
          print("C3A_AUTHORITATIVE_RESULT=" + decision["economic_result"])
          print("C3A_SELECTED_POLICY=" + str(decision["selected_policy"]))
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("# C3A Authoritative Screen\n\n")
              handle.write(f"- Source SHA: `{os.environ['C3A_SOURCE_SHA']}`\n")
              handle.write(f"- Merge-ref SHA: `{os.environ['C3A_MERGE_REF_SHA']}`\n")
              handle.write(f"- Economic result: **{decision['economic_result']}**\n")
              handle.write(f"- Selected policy: `{decision['selected_policy']}`\n")
              handle.write("- C3B: `CLOSED`\n- Holdout: `CLOSED`\n- Live: `FORBIDDEN`\n")
          PY

      - name: Record failure state for retained artifact
        if: failure()
        run: |
          set +e
          mkdir -p "$C3A_RUNTIME_DIR" "$C3A_RESULT_DIR"
          cat > "$C3A_RUNTIME_DIR/workflow_failure.json" <<JSON
          {
            "schema_version": 1,
            "stage": "C3A",
            "status": "EVIDENCE_FAILURE",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "source_head_sha": "${C3A_SOURCE_SHA}",
            "workflow_head_sha": "${C3A_WORKFLOW_HEAD_SHA}",
            "merge_ref_sha": "${C3A_MERGE_REF_SHA}",
            "confirmation_opened": false,
            "holdout_state": "HOLDOUT_CLOSED",
            "live": "FORBIDDEN"
          }
          JSON

      - name: Upload final C3A evidence even on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c3a-authoritative-evidence-${{ github.run_id }}
          path: |
            implementation/freqtrade_data/backtest_results/c3a_residual_mean_reversion
            implementation/freqtrade_data/c3a_authoritative_runtime
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
