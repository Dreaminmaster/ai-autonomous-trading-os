name: B4.2A Post-Merge Gate

on:
  pull_request:
    branches: [ci/b4.2a-post-merge-base]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  post-merge-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_SHA: 0dbe45bc80b1d85140e1bceaa1962952af07a778
      TARGET_BRANCH: main
      REPOSITORY: Dreaminmaster/ai-autonomous-trading-os
    steps:
      - name: Checkout exact merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify exact merge HEAD
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ATOS validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Bind exact main runs and download formal artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import io
          import json
          import os
          import urllib.request
          import zipfile
          from pathlib import Path

          repo = os.environ['REPOSITORY']
          target = os.environ['TARGET_SHA']
          branch = os.environ['TARGET_BRANCH']
          token = os.environ['GITHUB_TOKEN']
          api = f'https://api.github.com/repos/{repo}'

          def req(url, *, raw=False):
              request = urllib.request.Request(url)
              request.add_header('Authorization', 'Bearer ' + token)
              request.add_header('Accept', 'application/vnd.github+json')
              request.add_header('X-GitHub-Api-Version', '2022-11-28')
              with urllib.request.urlopen(request, timeout=120) as response:
                  body = response.read()
              return body if raw else json.loads(body)

          def resolve_workflow(path, name):
              data = req(api + '/actions/workflows?per_page=100')
              found = [
                  item for item in data.get('workflows', [])
                  if item.get('path') == path
                  and item.get('name') == name
                  and item.get('state') == 'active'
              ]
              assert len(found) == 1, (path, found)
              return found[0]

          def exact_main_push_run(workflow_id):
              data = req(
                  f'{api}/actions/workflows/{workflow_id}/runs'
                  f'?head_sha={target}&per_page=100'
              )
              found = [
                  run for run in data.get('workflow_runs', [])
                  if run.get('head_sha') == target
                  and run.get('head_branch') == branch
                  and run.get('event') == 'push'
              ]
              assert len(found) == 1, [run.get('id') for run in found]
              assert found[0].get('status') == 'completed', found[0]
              return found[0]

          ci_workflow = resolve_workflow('.github/workflows/ci.yml', 'CI')
          ft_workflow = resolve_workflow(
              '.github/workflows/freqtrade-validation.yml',
              'Freqtrade Validation',
          )
          ci_run = exact_main_push_run(ci_workflow['id'])
          ft_run = exact_main_push_run(ft_workflow['id'])
          assert ci_run.get('conclusion') == 'success', ci_run

          jobs_data = req(f'{api}/actions/runs/{ft_run["id"]}/jobs?per_page=100')
          jobs = {job['name']: job for job in jobs_data.get('jobs', [])}
          assert jobs['freqtrade']['conclusion'] == 'success', jobs['freqtrade']
          assert jobs['atos-tests']['conclusion'] == 'success', jobs['atos-tests']

          summary_job = jobs['validation-summary']
          assert summary_job['conclusion'] == 'failure', summary_job
          steps = {step['name']: step for step in summary_job.get('steps', [])}
          assert steps['Verify Simple CI']['conclusion'] == 'failure', steps
          assert steps['Run evidence summary']['conclusion'] == 'skipped', steps

          artifacts_data = req(
              f'{api}/actions/runs/{ft_run["id"]}/artifacts?per_page=100'
          )
          artifacts = {
              item['name']: item
              for item in artifacts_data.get('artifacts', [])
              if not item.get('expired')
          }
          required = {'atos-validation', 'freqtrade-validation'}
          assert required.issubset(artifacts), artifacts.keys()

          def extract_artifact(name, destination):
              payload = req(artifacts[name]['archive_download_url'], raw=True)
              destination.mkdir(parents=True, exist_ok=True)
              with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                  archive.extractall(destination)

          extract_artifact('atos-validation', Path('atos_artifacts'))
          extract_artifact('freqtrade-validation', Path('freqtrade_artifacts'))

          simple_ci = {
              'schema_version': 1,
              'workflow_id': ci_workflow['id'],
              'workflow_name': 'CI',
              'workflow_path': '.github/workflows/ci.yml',
              'run_id': ci_run['id'],
              'head_sha': target,
              'status': ci_run['status'],
              'conclusion': ci_run['conclusion'],
              'verified': True,
              'selection_policy': (
                  'exact workflow + exact SHA + push event + exact main branch'
              ),
              'selected_event': ci_run['event'],
              'selected_head_branch': ci_run['head_branch'],
          }
          Path('implementation/simple_ci_evidence.json').write_text(
              json.dumps(simple_ci, indent=2) + '\n',
              encoding='utf-8',
          )

          probe = {
              'schema_version': 1,
              'target_sha': target,
              'target_branch': branch,
              'ci_run_id': ci_run['id'],
              'freqtrade_run_id': ft_run['id'],
              'freqtrade_run_conclusion': ft_run['conclusion'],
              'required_job_results': {
                  'atos-tests': jobs['atos-tests']['conclusion'],
                  'freqtrade': jobs['freqtrade']['conclusion'],
              },
              'known_summary_infrastructure_failure': {
                  'job': summary_job['conclusion'],
                  'Verify Simple CI': steps['Verify Simple CI']['conclusion'],
                  'Run evidence summary': steps['Run evidence summary']['conclusion'],
              },
              'artifact_ids': {
                  name: artifacts[name]['id'] for name in sorted(required)
              },
              'live': 'FORBIDDEN',
          }
          Path('post_merge_probe.json').write_text(
              json.dumps(probe, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
              env_file.write(f'FT_RUN_ID={ft_run["id"]}\n')
          print(json.dumps(probe, indent=2, sort_keys=True))
          PY

      - name: Validate exact artifact provenance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          target = os.environ['TARGET_SHA']
          run_id = os.environ['FT_RUN_ID']

          def load(path):
              return json.loads(Path(path).read_text(encoding='utf-8'))

          atos = load('atos_artifacts/evidence_manifest.json')
          freq = load('freqtrade_artifacts/evidence_manifest.json')
          canonical = load(
              'freqtrade_artifacts/freqtrade_data/backtest_results/'
              'canonical_baseline_summary.json'
          )
          lookahead = load(
              'freqtrade_artifacts/freqtrade_data/backtest_results/'
              'canonical_baseline_la_lookahead_status.json'
          )
          round1 = load(
              'freqtrade_artifacts/validation_reports/strategy_fix_round1.json'
          )

          assert atos['head_sha'] == target and atos['run_id'] == run_id, atos
          assert freq['head_sha'] == target and freq['run_id'] == run_id, freq
          assert canonical['run_id'] == run_id, canonical
          assert canonical['baseline_integrity'] == 'CONFIRMED', canonical
          assert canonical['pair_universe_integrity'] == 'PASS', canonical
          assert canonical['cache_mode'] == 'none', canonical
          assert lookahead['final_status'] in ('PASS', 'PASS_WITH_RC_ANOMALY'), lookahead
          assert lookahead['has_bias'] is False, lookahead
          assert round1['head_sha'] == target and round1['run_id'] == run_id, round1
          assert round1['baseline_integrity'] == 'PASS', round1
          PY

      - name: Regenerate canonical validation summary
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m atos.evidence_summary \
            "$TARGET_SHA" \
            "$FT_RUN_ID" \
            success \
            success \
            ../atos_artifacts \
            ../freqtrade_artifacts \
            simple_ci_evidence.json

      - name: Enforce post-merge PASS
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(
              Path('implementation/validation_summary.json').read_text(
                  encoding='utf-8'
              )
          )
          assert summary['head_sha'] == os.environ['TARGET_SHA'], summary
          assert summary['run_id'] == os.environ['FT_RUN_ID'], summary
          assert summary['gate_status'] == 'PASS', summary
          assert summary['errors'] == [], summary
          assert summary['live'] == 'FORBIDDEN', summary

          final = {
              'schema_version': 1,
              'target_sha': os.environ['TARGET_SHA'],
              'target_branch': os.environ['TARGET_BRANCH'],
              'gate_status': 'PASS',
              'errors': [],
              'live': 'FORBIDDEN',
              'validation_summary': summary,
              'probe': json.loads(
                  Path('post_merge_probe.json').read_text(encoding='utf-8')
              ),
          }
          Path('b4_2a_post_merge_gate.json').write_text(
              json.dumps(final, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(final, indent=2, sort_keys=True))
          PY

      - name: Upload post-merge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-2a-post-merge-gate
          path: |
            b4_2a_post_merge_gate.json
            post_merge_probe.json
            implementation/simple_ci_evidence.json
            implementation/validation_summary.json
            implementation/validation_summary.md
            atos_artifacts/evidence_manifest.json
            atos_artifacts/pytest.log
            atos_artifacts/no_secret_scan.log
            freqtrade_artifacts/evidence_manifest.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_summary.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json
            freqtrade_artifacts/validation_reports/strategy_fix_round1.json
          if-no-files-found: warn
          retention-days: 90
