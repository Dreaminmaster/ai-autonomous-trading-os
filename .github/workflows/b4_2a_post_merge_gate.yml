name: B4.2A Post-Merge Gate

on:
  pull_request:
    branches: [ci/b4.2a-post-merge-base]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  post-merge-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 210
    env:
      TARGET_SHA: 0dbe45bc80b1d85140e1bceaa1962952af07a778
      TARGET_BRANCH: main
      REPOSITORY: Dreaminmaster/ai-autonomous-trading-os
    steps:
      - name: Checkout exact merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify exact merge HEAD
        run: test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Probe exact post-merge evidence
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import io, json, os, time, urllib.request, zipfile
          from pathlib import Path

          repo = os.environ["REPOSITORY"]
          target = os.environ["TARGET_SHA"]
          branch = os.environ["TARGET_BRANCH"]
          token = os.environ["GITHUB_TOKEN"]
          api = f"https://api.github.com/repos/{repo}"
          out = {
              "schema_version": 1,
              "target_sha": target,
              "target_branch": branch,
              "gate_status": "FAIL",
              "live": "FORBIDDEN",
              "errors": [],
          }

          def req(url, *, as_json=True):
              q = urllib.request.Request(url)
              q.add_header("Authorization", "Bearer " + token)
              q.add_header("Accept", "application/vnd.github+json")
              q.add_header("X-GitHub-Api-Version", "2022-11-28")
              with urllib.request.urlopen(q, timeout=120) as r:
                  raw = r.read()
              return json.loads(raw) if as_json else raw

          def workflow_id(path, name):
              data = req(api + "/actions/workflows?per_page=100")
              found = [
                  w for w in data.get("workflows", [])
                  if w.get("path") == path
                  and w.get("name") == name
                  and w.get("state") == "active"
              ]
              if len(found) != 1:
                  raise RuntimeError(f"workflow lookup failed: {path}: {found}")
              return found[0]["id"]

          def wait_run(wid, label):
              deadline = time.time() + 10800
              while time.time() < deadline:
                  data = req(f"{api}/actions/workflows/{wid}/runs?head_sha={target}&per_page=50")
                  found = [
                      r for r in data.get("workflow_runs", [])
                      if r.get("head_sha") == target
                      and r.get("event") == "push"
                      and r.get("head_branch") == branch
                  ]
                  if len(found) > 1:
                      raise RuntimeError(f"{label}: ambiguous runs {[r.get('id') for r in found]}")
                  if not found:
                      print(f"{label}: waiting for run", flush=True)
                      time.sleep(30)
                      continue
                  run = found[0]
                  print(
                      f"{label}: id={run.get('id')} status={run.get('status')} "
                      f"conclusion={run.get('conclusion')}",
                      flush=True,
                  )
                  if run.get("status") != "completed":
                      time.sleep(30)
                      continue
                  if run.get("conclusion") != "success":
                      raise RuntimeError(f"{label}: failed run {run}")
                  return run
              raise RuntimeError(f"{label}: timeout")

          def wait_artifacts(run_id):
              required = {"atos-validation", "freqtrade-validation", "validation-summary"}
              deadline = time.time() + 600
              while time.time() < deadline:
                  data = req(f"{api}/actions/runs/{run_id}/artifacts?per_page=100")
                  arts = {
                      a["name"]: a
                      for a in data.get("artifacts", [])
                      if not a.get("expired")
                  }
                  if required.issubset(arts):
                      return arts
                  print(f"waiting artifacts: {sorted(required - set(arts))}", flush=True)
                  time.sleep(15)
              raise RuntimeError("required artifacts missing")

          def artifact_json(artifact, suffix):
              raw = req(artifact["archive_download_url"], as_json=False)
              with zipfile.ZipFile(io.BytesIO(raw)) as zf:
                  names = [n for n in zf.namelist() if n.endswith(suffix)]
                  if len(names) != 1:
                      raise RuntimeError(
                          f"{artifact['name']}: expected one {suffix}, got {names}"
                      )
                  return json.loads(zf.read(names[0]))

          try:
              ci = wait_run(workflow_id(".github/workflows/ci.yml", "CI"), "CI")
              ft = wait_run(
                  workflow_id(
                      ".github/workflows/freqtrade-validation.yml",
                      "Freqtrade Validation",
                  ),
                  "Freqtrade Validation",
              )
              arts = wait_artifacts(ft["id"])
              summary = artifact_json(arts["validation-summary"], "validation_summary.json")
              atos_manifest = artifact_json(arts["atos-validation"], "evidence_manifest.json")
              freq_manifest = artifact_json(
                  arts["freqtrade-validation"], "evidence_manifest.json"
              )
              canonical = artifact_json(
                  arts["freqtrade-validation"], "canonical_baseline_summary.json"
              )
              lookahead = artifact_json(
                  arts["freqtrade-validation"],
                  "canonical_baseline_la_lookahead_status.json",
              )
              round1 = artifact_json(
                  arts["freqtrade-validation"], "strategy_fix_round1.json"
              )

              assert summary["head_sha"] == target
              assert summary["gate_status"] == "PASS"
              assert summary["errors"] == []
              assert summary["live"] == "FORBIDDEN"
              assert atos_manifest["head_sha"] == target
              assert freq_manifest["head_sha"] == target
              assert atos_manifest["run_id"] == str(ft["id"])
              assert freq_manifest["run_id"] == str(ft["id"])
              assert canonical["run_id"] == str(ft["id"])
              assert canonical["baseline_integrity"] == "CONFIRMED"
              assert canonical["pair_universe_integrity"] == "PASS"
              assert canonical["cache_mode"] == "none"
              assert lookahead["final_status"] in ("PASS", "PASS_WITH_RC_ANOMALY")
              assert lookahead["has_bias"] is False
              assert round1["head_sha"] == target
              assert round1["run_id"] == str(ft["id"])
              assert round1["baseline_integrity"] == "PASS"

              out.update({
                  "gate_status": "PASS",
                  "ci_run_id": ci["id"],
                  "freqtrade_run_id": ft["id"],
                  "artifact_ids": {k: v["id"] for k, v in arts.items()},
                  "validation_summary": summary,
                  "canonical": canonical,
                  "lookahead": lookahead,
                  "round1": round1,
              })
          except Exception as exc:
              out["errors"].append(f"{type(exc).__name__}: {exc}")
          finally:
              Path("b4_2a_post_merge_gate.json").write_text(
                  json.dumps(out, indent=2, sort_keys=True) + "\n"
              )
              print(json.dumps(out, indent=2, sort_keys=True))

          if out["gate_status"] != "PASS":
              raise SystemExit(1)
          PY

      - name: Upload post-merge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-2a-post-merge-gate
          path: b4_2a_post_merge_gate.json
          if-no-files-found: error
          retention-days: 90

      - name: Enforce post-merge PASS
        if: always()
        run: |
          python - <<'PY'
          import json
          data = json.load(open("b4_2a_post_merge_gate.json"))
          assert data["gate_status"] == "PASS", data
          assert data["errors"] == [], data
          assert data["live"] == "FORBIDDEN", data
          PY
