name: B4.2A Post-Merge Gate

on:
  pull_request:
    branches: [ci/b4.2a-post-merge-base]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  post-merge-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      TARGET_SHA: 0dbe45bc80b1d85140e1bceaa1962952af07a778
      TARGET_BRANCH: main
      REPOSITORY: Dreaminmaster/ai-autonomous-trading-os
      CI_WORKFLOW_ID: '305746223'
      FREQTRADE_WORKFLOW_ID: '305848317'
      FREQTRADE_RUN_ID: '29142207541'
    steps:
      - name: Checkout exact merge SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify exact merge HEAD
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ATOS validation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Bind exact main CI and formal Freqtrade run
        id: bind
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import traceback
          import urllib.request
          from pathlib import Path

          repo = os.environ['REPOSITORY']
          target = os.environ['TARGET_SHA']
          branch = os.environ['TARGET_BRANCH']
          token = os.environ['GITHUB_TOKEN']
          ci_workflow_id = int(os.environ['CI_WORKFLOW_ID'])
          ft_workflow_id = int(os.environ['FREQTRADE_WORKFLOW_ID'])
          ft_run_id = int(os.environ['FREQTRADE_RUN_ID'])
          api = f'https://api.github.com/repos/{repo}'
          result = {
              'schema_version': 1,
              'target_sha': target,
              'target_branch': branch,
              'gate_status': 'FAIL',
              'errors': [],
              'live': 'FORBIDDEN',
          }

          def req(url):
              request = urllib.request.Request(url)
              request.add_header('Authorization', 'Bearer ' + token)
              request.add_header('Accept', 'application/vnd.github+json')
              request.add_header('X-GitHub-Api-Version', '2022-11-28')
              with urllib.request.urlopen(request, timeout=120) as response:
                  return json.loads(response.read())

          try:
              ci_workflow = req(f'{api}/actions/workflows/{ci_workflow_id}')
              assert ci_workflow['name'] == 'CI', ci_workflow
              assert ci_workflow['path'] == '.github/workflows/ci.yml', ci_workflow

              ci_runs = req(
                  f'{api}/actions/workflows/{ci_workflow_id}/runs'
                  f'?head_sha={target}&per_page=100'
              )
              ci_matches = [
                  run for run in ci_runs.get('workflow_runs', [])
                  if run.get('head_sha') == target
                  and run.get('head_branch') == branch
                  and run.get('event') == 'push'
              ]
              assert len(ci_matches) == 1, [run.get('id') for run in ci_matches]
              ci_run = ci_matches[0]
              assert ci_run['status'] == 'completed', ci_run
              assert ci_run['conclusion'] == 'success', ci_run

              ft_workflow = req(f'{api}/actions/workflows/{ft_workflow_id}')
              assert ft_workflow['name'] == 'Freqtrade Validation', ft_workflow
              assert ft_workflow['path'] == '.github/workflows/freqtrade-validation.yml', ft_workflow

              ft_run = req(f'{api}/actions/runs/{ft_run_id}')
              assert ft_run['workflow_id'] == ft_workflow_id, ft_run
              assert ft_run['head_sha'] == target, ft_run
              assert ft_run['head_branch'] == branch, ft_run
              assert ft_run['event'] == 'push', ft_run
              assert ft_run['status'] == 'completed', ft_run

              jobs_data = req(f'{api}/actions/runs/{ft_run_id}/jobs?per_page=100')
              jobs = {job['name']: job for job in jobs_data.get('jobs', [])}
              assert jobs['freqtrade']['conclusion'] == 'success', jobs['freqtrade']
              assert jobs['atos-tests']['conclusion'] == 'success', jobs['atos-tests']

              summary_job = jobs['validation-summary']
              assert summary_job['conclusion'] == 'failure', summary_job
              summary_steps = {
                  step['name']: step for step in summary_job.get('steps', [])
              }
              assert summary_steps['Verify Simple CI']['conclusion'] == 'failure', summary_steps
              assert summary_steps['Run evidence summary']['conclusion'] == 'skipped', summary_steps

              simple_ci = {
                  'schema_version': 1,
                  'workflow_id': ci_workflow_id,
                  'workflow_name': 'CI',
                  'workflow_path': '.github/workflows/ci.yml',
                  'run_id': ci_run['id'],
                  'head_sha': target,
                  'status': ci_run['status'],
                  'conclusion': ci_run['conclusion'],
                  'verified': True,
                  'selection_policy': (
                      'exact workflow + exact SHA + push event + exact main branch'
                  ),
                  'selected_event': ci_run['event'],
                  'selected_head_branch': ci_run['head_branch'],
              }
              Path('implementation/simple_ci_evidence.json').write_text(
                  json.dumps(simple_ci, indent=2) + '\n',
                  encoding='utf-8',
              )

              result.update({
                  'gate_status': 'PASS',
                  'ci_run_id': ci_run['id'],
                  'freqtrade_run_id': ft_run_id,
                  'freqtrade_overall_conclusion': ft_run['conclusion'],
                  'required_job_results': {
                      'atos-tests': jobs['atos-tests']['conclusion'],
                      'freqtrade': jobs['freqtrade']['conclusion'],
                  },
                  'known_summary_infrastructure_failure': {
                      'validation-summary': summary_job['conclusion'],
                      'Verify Simple CI': summary_steps['Verify Simple CI']['conclusion'],
                      'Run evidence summary': summary_steps['Run evidence summary']['conclusion'],
                  },
              })
          except Exception as exc:
              result['errors'].append(f'{type(exc).__name__}: {exc}')
              result['traceback'] = traceback.format_exc()

          Path('post_merge_binding.json').write_text(
              json.dumps(result, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(result, indent=2, sort_keys=True))
          if result['gate_status'] != 'PASS':
              raise SystemExit(1)
          PY

      - name: Download formal ATOS artifact
        if: steps.bind.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          name: atos-validation
          path: atos_artifacts
          repository: Dreaminmaster/ai-autonomous-trading-os
          run-id: ${{ env.FREQTRADE_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Download formal Freqtrade artifact
        if: steps.bind.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          name: freqtrade-validation
          path: freqtrade_artifacts
          repository: Dreaminmaster/ai-autonomous-trading-os
          run-id: ${{ env.FREQTRADE_RUN_ID }}
          github-token: ${{ github.token }}

      - name: Validate exact artifact provenance
        if: steps.bind.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          target = os.environ['TARGET_SHA']
          run_id = os.environ['FREQTRADE_RUN_ID']

          def load(path):
              return json.loads(Path(path).read_text(encoding='utf-8'))

          atos = load('atos_artifacts/evidence_manifest.json')
          freq = load('freqtrade_artifacts/evidence_manifest.json')
          canonical = load(
              'freqtrade_artifacts/freqtrade_data/backtest_results/'
              'canonical_baseline_summary.json'
          )
          lookahead = load(
              'freqtrade_artifacts/freqtrade_data/backtest_results/'
              'canonical_baseline_la_lookahead_status.json'
          )
          round1 = load(
              'freqtrade_artifacts/validation_reports/strategy_fix_round1.json'
          )

          assert atos['head_sha'] == target and atos['run_id'] == run_id, atos
          assert freq['head_sha'] == target and freq['run_id'] == run_id, freq
          assert canonical['run_id'] == run_id, canonical
          assert canonical['baseline_integrity'] == 'CONFIRMED', canonical
          assert canonical['pair_universe_integrity'] == 'PASS', canonical
          assert canonical['cache_mode'] == 'none', canonical
          assert lookahead['final_status'] in ('PASS', 'PASS_WITH_RC_ANOMALY'), lookahead
          assert lookahead['has_bias'] is False, lookahead
          assert round1['head_sha'] == target and round1['run_id'] == run_id, round1
          assert round1['baseline_integrity'] == 'PASS', round1
          PY

      - name: Regenerate canonical validation summary
        if: steps.bind.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m atos.evidence_summary \
            "$TARGET_SHA" \
            "$FREQTRADE_RUN_ID" \
            success \
            success \
            ../atos_artifacts \
            ../freqtrade_artifacts \
            simple_ci_evidence.json

      - name: Enforce post-merge PASS
        if: steps.bind.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = json.loads(
              Path('implementation/validation_summary.json').read_text(
                  encoding='utf-8'
              )
          )
          assert summary['head_sha'] == os.environ['TARGET_SHA'], summary
          assert summary['run_id'] == os.environ['FREQTRADE_RUN_ID'], summary
          assert summary['gate_status'] == 'PASS', summary
          assert summary['errors'] == [], summary
          assert summary['live'] == 'FORBIDDEN', summary

          final = {
              'schema_version': 1,
              'target_sha': os.environ['TARGET_SHA'],
              'target_branch': os.environ['TARGET_BRANCH'],
              'gate_status': 'PASS',
              'errors': [],
              'live': 'FORBIDDEN',
              'binding': json.loads(
                  Path('post_merge_binding.json').read_text(encoding='utf-8')
              ),
              'validation_summary': summary,
          }
          Path('b4_2a_post_merge_gate.json').write_text(
              json.dumps(final, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(final, indent=2, sort_keys=True))
          PY

      - name: Upload post-merge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-2a-post-merge-gate
          path: |
            post_merge_binding.json
            b4_2a_post_merge_gate.json
            implementation/simple_ci_evidence.json
            implementation/validation_summary.json
            implementation/validation_summary.md
            atos_artifacts/evidence_manifest.json
            atos_artifacts/pytest.log
            atos_artifacts/no_secret_scan.log
            freqtrade_artifacts/evidence_manifest.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_summary.json
            freqtrade_artifacts/freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json
            freqtrade_artifacts/validation_reports/strategy_fix_round1.json
          if-no-files-found: warn
          retention-days: 90

      - name: Require successful binding and final gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.bind.outcome }}" = "success"
          python - <<'PY'
          import json
          data = json.load(open('b4_2a_post_merge_gate.json'))
          assert data['gate_status'] == 'PASS', data
          assert data['errors'] == [], data
          assert data['live'] == 'FORBIDDEN', data
          PY
