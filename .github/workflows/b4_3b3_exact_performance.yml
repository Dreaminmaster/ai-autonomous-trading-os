name: B4.3B3 Exact Attribution Gate

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_exact_performance.yml'

permissions:
  contents: read

jobs:
  exact-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 73b2891052ddf1a02db284d7721b4d451017e28b
          fetch-depth: 1
      - name: Verify exact candidate
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '73b2891052ddf1a02db284d7721b4d451017e28b'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd implementation
          python -m pip install -e '.[dev]'
      - name: Run exact full pytest
        run: |
          set -euo pipefail
          cd implementation
          set -o pipefail
          python -m pytest -q --tb=short 2>&1 | tee b4_3b3_exact_pytest.log
      - name: Run exact secret leakage scan
        run: |
          set -euo pipefail
          cd implementation
          set -o pipefail
          bash scripts/validate_no_secrets.sh 2>&1 | tee b4_3b3_exact_no_secret_scan.log
      - name: Upload exact test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-3b3-exact-tests
          path: |
            implementation/b4_3b3_exact_pytest.log
            implementation/b4_3b3_exact_no_secret_scan.log
          if-no-files-found: warn
          retention-days: 14

  exact-performance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 73b2891052ddf1a02db284d7721b4d451017e28b
          fetch-depth: 1
      - name: Verify exact candidate
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = '73b2891052ddf1a02db284d7721b4d451017e28b'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd implementation
          python -m pip install -e '.[dev]'
      - name: Run exact attribution-correct performance gate
        run: |
          set -euo pipefail
          cd implementation
          python scripts/benchmark_b4_3b_lifecycle.py \
            --output b4_3b3_exact_performance.json \
            --sample-count 80 \
            --warmup-count 12 \
            --head-sha 73b2891052ddf1a02db284d7721b4d451017e28b \
            --run-id "${GITHUB_RUN_ID}" \
            2>&1 | tee b4_3b3_exact_performance.log
      - name: Verify exact attribution evidence
        run: |
          set -euo pipefail
          cd implementation
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path('b4_3b3_exact_performance.json').read_text())
          assert report['head_sha'] == '73b2891052ddf1a02db284d7721b4d451017e28b'
          assert report['run_id'] == os.environ['GITHUB_RUN_ID']
          assert report['gate_status'] == 'PASS'
          assert report['errors'] == []
          assert report['live'] == 'FORBIDDEN'
          assert report['max_p95_ratio'] == 1.10
          assert report['performance_gate_method'] == (
              'boundary_p95_overhead_projected_on_durable_p95'
          )
          assert set(report['boundary_dispatch']) == {'order', 'fill'}
          for kind, boundary in report['boundary_dispatch'].items():
              assert boundary['kind'] == kind
              assert boundary['batch_size'] == 20_000
              assert boundary['overhead_p95_ns_per_call'] >= 0
              assert len(boundary['replicates']) == 5
          assert len(report['operations']) == 5
          for record in report['operations']:
              assert record['gate_status'] == 'PASS'
              assert record['performance_gate_method'] == (
                  'boundary_p95_overhead_projected_on_durable_p95'
              )
              assert 0 < record['p95_ratio'] <= 1.10
              assert record['observed_durable_p95_ratio'] > 0
              assert record['boundary_overhead_p95_ns'] >= 0
              assert record['durable_reference_p95_ns'] > 0
              assert record['connection_reuse'] is True
          print('Exact attribution-correct B4.3B3 evidence verified.')
          PY
      - name: Upload exact performance artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-3b3-exact-performance
          path: |
            implementation/b4_3b3_exact_performance.json
            implementation/b4_3b3_exact_performance.log
          if-no-files-found: warn
          retention-days: 14
