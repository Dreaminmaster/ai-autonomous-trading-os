name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd implementation
          python -m pip install -q -e '.[dev]'
      - name: Tests
        id: tests
        continue-on-error: true
        run: |
          cd implementation
          python -m pytest -q --tb=short --junitxml=pytest-results.xml
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics
          path: implementation/pytest-results.xml
          if-no-files-found: error
          retention-days: 1
      - name: Preserve pytest conclusion
        if: steps.tests.outcome == 'failure'
        run: exit 1
