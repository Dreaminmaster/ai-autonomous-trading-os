name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd implementation
          python -m pip install -e '.[dev]'
      - name: Tests
        run: |
          cd implementation
          python -m pytest
