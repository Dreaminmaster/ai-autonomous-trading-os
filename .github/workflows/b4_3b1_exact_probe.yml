name: B4.3B1 Exact Run Probe

on:
  pull_request:
    paths:
      - ".github/workflows/b4_3b1_exact_probe.yml"

permissions:
  contents: read
  actions: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact candidate
        uses: actions/checkout@v4
        with:
          ref: ab462274cff69dd1ff14b71c67f921f3d85d4990

      - name: Verify exact HEAD
        run: |
          test "$(git rev-parse HEAD)" = "ab462274cff69dd1ff14b71c67f921f3d85d4990"

      - name: Probe exact workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ab462274cff69dd1ff14b71c67f921f3d85d4990
          TARGET_BRANCH: feat/b4.3b1-typed-accounting-policy
          REPO: Dreaminmaster/ai-autonomous-trading-os
        run: |
          python - <<'PY'
          import json, os, urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["REPO"]
          sha = os.environ["TARGET_SHA"]
          branch = os.environ["TARGET_BRANCH"]

          def api(url):
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read())

          workflows = api(f"https://api.github.com/repos/{repo}/actions/workflows?per_page=100")["workflows"]
          targets = {
              ".github/workflows/ci.yml": "CI",
              ".github/workflows/freqtrade-validation.yml": "Freqtrade Validation",
          }
          report = {
              "schema_version": 1,
              "target_sha": sha,
              "target_branch": branch,
              "workflows": {},
              "live": "FORBIDDEN",
          }

          for path, expected_name in targets.items():
              matches = [w for w in workflows if w.get("path") == path and w.get("name") == expected_name]
              if len(matches) != 1:
                  raise RuntimeError(f"workflow resolution failed for {path}: {len(matches)}")
              workflow = matches[0]
              runs = api(
                  f"https://api.github.com/repos/{repo}/actions/workflows/{workflow['id']}/runs"
                  f"?head_sha={sha}&per_page=100"
              )["workflow_runs"]
              normalized = []
              for run in runs:
                  run_id = run["id"]
                  jobs = api(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100")["jobs"]
                  artifacts = api(f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/artifacts?per_page=100")["artifacts"]
                  normalized.append({
                      "id": run_id,
                      "event": run.get("event"),
                      "head_branch": run.get("head_branch"),
                      "head_sha": run.get("head_sha"),
                      "status": run.get("status"),
                      "conclusion": run.get("conclusion"),
                      "created_at": run.get("created_at"),
                      "jobs": [
                          {
                              "id": job.get("id"),
                              "name": job.get("name"),
                              "status": job.get("status"),
                              "conclusion": job.get("conclusion"),
                          }
                          for job in jobs
                      ],
                      "artifacts": [
                          {
                              "id": artifact.get("id"),
                              "name": artifact.get("name"),
                              "expired": artifact.get("expired"),
                              "digest": artifact.get("digest"),
                          }
                          for artifact in artifacts
                      ],
                  })
              report["workflows"][path] = {
                  "workflow_id": workflow["id"],
                  "workflow_name": workflow["name"],
                  "runs": normalized,
              }

          ci_runs = report["workflows"][".github/workflows/ci.yml"]["runs"]
          exact_ci = [
              r for r in ci_runs
              if r["event"] == "push"
              and r["head_branch"] == branch
              and r["head_sha"] == sha
              and r["status"] == "completed"
              and r["conclusion"] == "success"
          ]
          report["exact_push_ci_count"] = len(exact_ci)
          report["exact_push_ci_run_ids"] = [r["id"] for r in exact_ci]
          with open("exact_probe.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
          print(json.dumps(report, indent=2, sort_keys=True))
          if not exact_ci:
              raise RuntimeError("no completed successful exact candidate push CI run")
          PY

      - name: Upload probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: b4-3b1-exact-run-probe
          path: exact_probe.json
          if-no-files-found: error
