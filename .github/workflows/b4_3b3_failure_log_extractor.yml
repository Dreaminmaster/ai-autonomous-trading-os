name: B4.3B3 Failure Log Extractor

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_failure_log_extractor.yml'

permissions:
  contents: write

jobs:
  write-test-clean:
    if: github.head_ref == 'feat/b4.3b3-lifecycle-performance-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/b4.3b3-lifecycle-performance-gate
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Decode exact paired crossover sources
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/tmp/b4_3b3_crossover_benchmark.gz.b64 | gzip -d > implementation/scripts/benchmark_b4_3b_lifecycle.py
          base64 -d .github/tmp/b4_3b3_crossover_test.gz.b64 | gzip -d > implementation/tests/test_b4_3b_performance_contract.py
          test "$(sha256sum implementation/scripts/benchmark_b4_3b_lifecycle.py | awk '{print $1}')" = '6fbadf90d70aa50c73c4fb4b7157aef67a3cde13d1d0d5445167ae218e743ed4'
          test "$(sha256sum implementation/tests/test_b4_3b_performance_contract.py | awk '{print $1}')" = 'aa2049e9427d6f2057b2011bca0aec58f567f0a42866f0138e950f3198e2531e'
          python -m py_compile implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py
      - name: Run targeted paired crossover performance gate
        shell: bash
        run: |
          set -euo pipefail
          cd implementation
          python -m pip install -e '.[dev]'
          python -m pytest -q tests/test_b4_3b_performance_contract.py --tb=short
      - name: Commit product sources and delete temporary assets
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/b4_3b3_failure_log_extractor.yml
          rm .github/tmp/b4_3b3_crossover_benchmark.gz.b64 .github/tmp/b4_3b3_crossover_test.gz.b64
          git add implementation/scripts/benchmark_b4_3b_lifecycle.py implementation/tests/test_b4_3b_performance_contract.py .github/workflows/b4_3b3_failure_log_extractor.yml .github/tmp/b4_3b3_crossover_benchmark.gz.b64 .github/tmp/b4_3b3_crossover_test.gz.b64
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(b4.3b3): use paired database crossover measurement'
          git push origin HEAD:feat/b4.3b3-lifecycle-performance-gate
