name: B4.3B3 Failure Log Extractor

on:
  pull_request:
    paths:
      - '.github/workflows/b4_3b3_failure_log_extractor.yml'

permissions:
  contents: read

jobs:
  diagnose-source-identity:
    if: github.head_ref == 'feat/b4.3b3-lifecycle-performance-gate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/b4.3b3-lifecycle-performance-gate
          fetch-depth: 1
      - name: Decode and print exact identities
        shell: bash
        run: |
          set -uox pipefail
          wc -c .github/tmp/b4_3b3_crossover_benchmark.gz.b64 .github/tmp/b4_3b3_crossover_test.gz.b64
          sha256sum .github/tmp/b4_3b3_crossover_benchmark.gz.b64 .github/tmp/b4_3b3_crossover_test.gz.b64
          base64 -d .github/tmp/b4_3b3_crossover_benchmark.gz.b64 > /tmp/benchmark.gz
          base64 -d .github/tmp/b4_3b3_crossover_test.gz.b64 > /tmp/test.gz
          gzip -t /tmp/benchmark.gz
          gzip -t /tmp/test.gz
          gzip -dc /tmp/benchmark.gz > /tmp/benchmark.py
          gzip -dc /tmp/test.gz > /tmp/test.py
          echo '--- decoded identities ---'
          wc -c /tmp/benchmark.py /tmp/test.py
          sha256sum /tmp/benchmark.py /tmp/test.py
          head -n 3 /tmp/benchmark.py
          head -n 3 /tmp/test.py
          python -m py_compile /tmp/benchmark.py /tmp/test.py
