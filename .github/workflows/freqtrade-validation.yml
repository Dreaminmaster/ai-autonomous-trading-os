name: Freqtrade Validation

on:
  push:
    paths: ['implementation/**', '.github/workflows/freqtrade-validation.yml']
  pull_request:
    paths: ['implementation/**']
  workflow_dispatch:

jobs:
  atos-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install ATOS
        run: |
          cd implementation
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run pytest
        run: |
          cd implementation
          python -m pytest -v --tb=long 2>&1 | tee pytest.log
      - name: Secret leakage scan
        run: |
          cd implementation
          bash scripts/validate_no_secrets.sh 2>&1 | tee no_secret_scan.log
      - name: Generate evidence manifest (atos-tests)
        run: |
          cd implementation
          python scripts/generate_evidence_manifest.py atos-tests
      - name: CLI smoke test
        run: |
          cd implementation
          python -m atos.cli status; python -m atos.cli risk; python -m atos.cli cycle
          python -m atos.cli review; python -m atos.cli_ext evaluate
      - name: Walk-forward report
        run: |
          cd implementation && mkdir -p freqtrade_data/backtest_results
          python3 scripts/ci_walk_forward.py
      - name: Preflight evidence atos-tests
        run: |
          cd implementation
          python scripts/preflight_evidence_artifact.py atos-tests
      - name: Upload ATOS artifacts
        
        uses: actions/upload-artifact@v4
        with:
          name: atos-validation
          path: |
            implementation/evidence_manifest.json
            implementation/pytest.log
            implementation/no_secret_scan.log
            implementation/freqtrade_data/backtest_results/walk_forward_report.json
          retention-days: 14

  freqtrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq build-essential libssl-dev
          cd implementation
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,freqtrade]'
          python -c "import freqtrade; print('Freqtrade', freqtrade.__version__)"
      - name: Setup Freqtrade
        run: |
          cd implementation
          bash scripts/setup_freqtrade.sh
          cp config/policy.validation.json config/policy.json
      - name: List strategies
        run: |
          cd implementation
          freqtrade list-strategies --strategy-path freqtrade_data/strategies 2>&1 | tee freqtrade_list_strategies.log
          grep -q "AISupervisedStrategy" freqtrade_list_strategies.log && echo "AISupervisedStrategy found" || echo "AISupervisedStrategy NOT found"
      - name: Download OKX data
        timeout-minutes: 15
        continue-on-error: true
        run: |
          cd implementation && mkdir -p freqtrade_data/data/okx
          freqtrade download-data --config freqtrade_data/config.dryrun.json --datadir freqtrade_data/data/okx --exchange okx --pairs BTC/USDT --timeframes 5m --timerange 20250101-20250701 2>&1 | tee download_data.log
          ls freqtrade_data/data/okx/ || echo "(no data)"
      - name: Production-path safety test (required)
        run: |
          cd implementation
          python -m pytest tests/test_no_lookahead_strategy.py::test_resolve_candle_ts_reads_only_current_row_production_path -v --no-header -s
      - name: Generate evidence manifest (freqtrade)
        run: |
          cd implementation
          python scripts/generate_evidence_manifest.py freqtrade
      - name: Canonical fresh baseline
        run: |
          cd implementation
          python3 scripts/run_canonical_backtest.py canonical_baseline canonical_baseline config/policy.validation.json
          RUN_LOOKAHEAD=1 python3 scripts/run_canonical_backtest.py canonical_baseline_la canonical_baseline_la config/policy.validation.json
      - name: Multi-period + baseline + multi-pair + attribution
        if: always()
        continue-on-error: true
        env: {ATOS_POLICY: config/policy.validation.json}
        run: |
          cd implementation && mkdir -p validation_reports
          python3 scripts/ci_multi_period.py
          python3 scripts/ci_baselines.py
          python3 scripts/ci_multipair_attribution.py
      - name: Validate pair format
        if: always()
        run: |
          cd implementation
          python3 -c "
          import json; cfg = json.load(open('freqtrade_data/config.dryrun.json'))
          pairs = cfg.get('exchange',{}).get('pair_whitelist',[])
          for p in pairs:
              if ':USDT' in p: print(f'ERROR: {p}'); exit(1)
              print(f'OK: {p}')
          print('Pair format validated.')
          " 2>&1 | tee pair_format_check.log
      - name: Strategy Fix Round 1 (canonical)
        timeout-minutes: 120
        run: |
          cd implementation
          mkdir -p validation_reports
          python3 scripts/ci_strategy_fix_round1.py
    
      - name: Preflight evidence freqtrade
        run: |
          cd implementation
          python scripts/preflight_evidence_artifact.py freqtrade
      - name: Upload Freqtrade artifacts
        
        uses: actions/upload-artifact@v4
        with:
          name: freqtrade-validation
          path: |
            implementation/evidence_manifest.json
            implementation/freqtrade_data/backtest_results/canonical_baseline_summary.json
            implementation/freqtrade_data/backtest_results/canonical_baseline_la_lookahead_status.json
            implementation/validation_reports/strategy_fix_round1.json
            implementation/validation_reports/strategy_fix_round1.md
            implementation/freqtrade_data/backtest_results/round1_*_la_lookahead_status.json
          if-no-files-found: error

  validation-summary:
    runs-on: ubuntu-latest
    needs: [atos-tests, freqtrade]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          cd implementation
          python -m pip install -e '.[dev,freqtrade]'
      - uses: actions/download-artifact@v4
        with:
          name: atos-validation
          path: atos_artifacts
      - uses: actions/download-artifact@v4
        with:
          name: freqtrade-validation
          path: freqtrade_artifacts
      - name: Run evidence summary
        run: |
          cd implementation
          python -m atos.evidence_summary "${GITHUB_SHA}" "${GITHUB_RUN_ID}" "${{ needs.atos-tests.result }}" "${{ needs.freqtrade.result }}" "success" ../atos_artifacts ../freqtrade_artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: validation-summary
          path: |
            implementation/validation_summary.json
            implementation/validation_summary.md
          if-no-files-found: error
