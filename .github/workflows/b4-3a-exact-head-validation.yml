name: B4.3A Exact Head Validation

on:
  pull_request:
    branches: [ci/b4.3a-exact-head-base]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-head-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      TARGET_SHA: e00786dcd0904bd26546c826efe662a43ce8b89a
    steps:
      - name: Checkout exact candidate SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Verify exact HEAD
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          echo "TARGET_SHA=$TARGET_SHA"
          echo "ACTUAL_SHA=$actual"
          test "$actual" = "$TARGET_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ATOS dev dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e 'implementation[dev]'

      - name: Py compile
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            implementation/src/atos/runtime_migrations.py \
            implementation/tests/test_execution_persistence_schema.py \
            implementation/tests/test_order_fill_position_persistence_schema.py

      - name: Import and migration plan smoke
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=implementation/src python - <<'PY'
          from atos.runtime_migrations import MIGRATION_PLAN
          assert [m.version for m in MIGRATION_PLAN] == [1, 2, 3, 4]
          print([m.version for m in MIGRATION_PLAN])
          PY

      - name: Targeted B4.3A schema tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            implementation/tests/test_order_fill_position_persistence_schema.py \
            --tb=short 2>&1 | tee b4_3a_targeted.log

      - name: Frozen B4.2A regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            implementation/tests/test_execution_persistence_schema.py \
            --tb=short 2>&1 | tee b4_2a_regression.log

      - name: Migration engine regression
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q \
            implementation/tests/test_runtime_migrations.py \
            --tb=short 2>&1 | tee migration_regression.log

      - name: Full ATOS pytest
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q implementation/tests --tb=short \
            2>&1 | tee full_pytest.log

      - name: Generate exact-SHA checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          PYTHONPATH=implementation/src python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path
          from atos.runtime_migrations import MIGRATION_PLAN

          actual = subprocess.check_output(
              ['git', 'rev-parse', 'HEAD'], text=True
          ).strip()
          expected = os.environ['TARGET_SHA']
          checksums = {str(m.version): m.checksum for m in MIGRATION_PLAN}
          assert actual == expected
          assert checksums['1'] == 'b039c238f7d11bcd2fe09e33422a32ad0728147d01c34ffef759fae32fba0b1d'
          assert checksums['2'] == 'f2e8d13f91b7681f4a379c1fb7cff3b5cb12726dd3ebbdd93063b30fda192cca'
          assert checksums['3'] == 'e3efc7c169d46546e43473c7700a026c67f7ea3d272f3baa6cf36751bc7d257f'
          data = {
              'schema_version': 1,
              'target_sha': expected,
              'actual_sha': actual,
              'migration_versions': [m.version for m in MIGRATION_PLAN],
              'migration_checksums': checksums,
              'live': 'FORBIDDEN',
          }
          Path('b4_3a_exact_head_manifest.json').write_text(
              json.dumps(data, indent=2, sort_keys=True) + '\n'
          )
          print(json.dumps(data, indent=2, sort_keys=True))
          PY

      - name: Verify no tracked modifications
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code

      - name: Upload exact-head evidence
        uses: actions/upload-artifact@v4
        with:
          name: b4-3a-exact-head-validation
          path: |
            b4_3a_exact_head_manifest.json
            b4_3a_targeted.log
            b4_2a_regression.log
            migration_regression.log
            full_pytest.log
          if-no-files-found: error
          retention-days: 90
